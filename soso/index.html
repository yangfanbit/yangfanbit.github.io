                    var person = JSON.parse('{"posts":[{"title":"黄焖鸡启示录","content":"我照旧选择了周五晚十一点K1437，七个小时睡到余姚。同样是上铺，这次车顶铁皮不大听话，嘎吱嘎吱吵醒了我的凌晨。 余姚未见朝阳，清冽晨风中，我俩去老地点——家家福，逛进一家上海煎包，热气腾腾，就是有点子油。中午吃的一旁酸菜鱼，味道依旧，时光飞逝，为数不多的在这里吃饭已经贯穿了我的余姚四年。 下午看《唐探1900》，不错的喜剧，情绪更多放在爱国情怀面，“救中国”虽感不合时宜，但就是红了眼。晚上看饼叔的阿根廷纪录片，更深感今日中国来之不易，珍惜当下，好好生活。 流水记重点在第二天，周末。 离开余姚前之中午，我们都比较中意一家黄焖鸡，之前跑过好几次，尽管时间赶，还是叫车去店里。 没有失望，口味一如往日。这次饿了，我俩一人点一份分开吃。一边吃一边聊，看到门口玻璃上张贴着“店铺转让xxxxx”。 难道生意不好了么，我疑惑道。 估计现在经济下行，实体不好做啊，大家都收缩开支。女友转头瞥了一眼， 你看街对面那家奶茶店，也不知已经关了多久。 这会儿，来了两位外卖员，店里除我们外还有一位在吃的顾客，我觉着生意还行，毕竟已是下午一点多。 …… 结账时候，女友争着付，我在一旁没抢过，便顺出了我的疑问， 老板，咋店要转让啦，生意不好么？ 老板一笑，不是，我家里有事，开不了了。 哦，个人原因啊，要关多久啊，还是以后都不开了？ 我去打官司，估计咋么也得一年。你看过《小小的我》吗，我孩子也那样了。 看过一点介绍，您孩子大脑受损了吗，是医院的问题？ 是的，我问过抖音上的律师，主要是医院的问题，证据医院那边都有，打赢的概率比较大，只是需要比较多的时间。我孩子这事儿两年了，一直在治疗，保守估计六十万已经花出去，我老婆辞了工作照顾孩子，我这边一个是租不起，二是打官司搜集证据需要耗时间，家里只能我去跑了，预计要一年，能讨回来一点是一点，医院责任是比较大的。 …… 苦难之事，平缓流出。男人脸上一直挂着微笑，现在看，分明内有戚戚然。 你家孩子这样，主要是自理能力不行吧，我记得《小小的我》他还是参加高考成了的。 是的，但很难治好了。 啊，孩子长大不就更艰难了，这辈子……我欲言又止，心中不住叹息，看到新闻，和活生生发生在眼前，感受上实在沉重太多，一个家庭就这样活生生被拖下沼泽地，举步维艰。 没办法，只能一步一步过吧，我这几年在医院见得多了，很多有问题的孩子，家长就直接放弃了，丢给医院。医院也不能直接扔吧，就收容到福利院里，每天供给点吃的，其他就不太管了……这个看政府，政府有钱，像浙江江苏上海，孩子得到的照顾就多些，其他地方，那种大脑受损的孩子甚至捆起来（防止伤人），可能一天都没人帮他们翻动身体，会有褥疮，得败血病走的也不是没有…… 我说了一些安慰的话，然后沉默，还能做些什么呢？ 厨房间，可能是老板的母亲在帮忙收拾，我余光看着她忙来忙去，她也能听见老板的讲述，心里又是怎样的苦呢？ 再次说了几声祝福的话语，我们俩和老板道别，走出了这爿行将消失的黄焖鸡。 女朋友慨叹不已，生活不易，世事艰难啊。 后来，我一路提着我的座椅底座乘高铁，坐地铁，脑中时不时回想起老板一边微笑一边诉说之景，人生短暂，什么槛都抵不过时间呐，两年前事起，定是悲戚难掩，现如今脸上只余平静缓和。 我现在生活所谓的困难，都是有解决路径的，远没到他所面对的压力。 实际，这个不需要对比，你也能知晓。就像前面提的主题，早睡其实已不是小事，从大学毕业算起，整整八年过去了，你早睡时间加起来有俩月吗？ 面对问题，重视问题，解决问题。 自今日始。 ","link":"https://yfnwu.com/post/hmjqsl/"},{"title":"直到我的膝盖中了一箭","content":"今夕何夕 小雨淅淅 流水一记 你瞧，人不上班，星期几都不知道。（果然无工作，不星期） 今天主要处理三件事。 一是查膝伤。半月板二级损，危险边缘，医生嘱咐修养+药物+康复运动。我已经预备养伤期间，把游泳学了，盛夏将至，路上不了，水里扑腾去。（📢本赛季报销，拜拜了，我的海南环岛） 二是补个牙。几个月前就疼，但频率很低+定不了位。四月份时放心不下去拍片，医生也没发现问题。前天刷牙，偶然瞥见牙根侧面显个小黑洞，捅入牙线头，粗糙不平有阻塞，觉着是这了。今天再过去拍CT，发现龋齿，只是不在这个黑洞，黑是因为旧补牙材料慢慢掉，表面凹凸不平。真滴是误打误撞，勤检查永远没错。 三是博客备案。公安局来电话，说得简单，补个手续。真操作起来，俄罗斯套娃，烦躁得搞完。 另及，《人性的枷锁》啃完第一遍。（ps：作者书名改得不错。） 菲利普和德里德的情感纠缠那段真叫人看得憋屈，好在他当了医生后还算有趣。 阅后感悟： 人生本无意义，正因如此，每个自我赋予的意义才更显珍贵。 虚无不是终点，跨过去便是自由。 所以， 做好风险管控，此外随心而去。 窗外雨还在下。 人活在世上，如同囚犯一般，在这世界上，所有的人都是相互禁锢着的。 爱情是生命中最美好的事情，但它也是世界上最痛苦的事情之一。 我们总是以为自己可以掌控自己的命运，然而，我们的命运是由我们的行为和选择所决定的。 人们总是被迷惑着，追求那些看似有价值的事物，但这些事物通常都是虚无缥缈的。 我们每个人都生活在自己的世界里，无法理解别人的痛苦和快乐。 我们每个人都有一个内心，但我们通常不敢面对自己的内心，因为它会揭示我们最深层的欲望和恐惧。 人们总是在寻找幸福，但幸福并不是一个可以被追求的东西，它只有在我们不去追求的时候才会自然而然地到来。 我们每个人都有能力做出正确的决定，但我们通常会被外界因素所左右。 ——《人性的枷锁》 ","link":"https://yfnwu.com/post/cwmxz/"},{"title":"前路漫漫亦慢慢","content":"阴天 周一 今天是腊月十二，我生日前一天。 我想，还没有找到一种合适的方式，进行下班到自我实现的转变。 原因当前认为有以下三点： 上班确实是一种消耗精力的行为，但又不得不做，所以在暂时没有跳出其之前，把其负面BUFF降低。 下班给自己默认了一段休息时间，而进入一段状态是容易的，主动脱离就比较困难了。 人生还没有找到主心骨，也就是说价值实现的明确路径，总在这个可以试试，那个感觉也可以的状态里来回荡漾。没有熟练进入你喜欢的“心流”。 针对这三点讲，要做的就很明确了。 环境已经创造好了，当务之急是找到心流之所在。 输入输出不能停。 笔记记起来，文章写起来，视频做起来。 离职日期大抵是确定了，现在正是制定和尝试计划的时候！ 好，下面先开始今天的诗词任务。 ","link":"https://yfnwu.com/post/qlmmymm/"},{"title":"青草和像素阳光","content":"灰色云层压着窗框，风寂寂。 若今儿是工作日，马上就到下班时间。 而我，折腾来去，才堪堪完成办公环境搭建。这堆电子物件不断被排列组合，反映出三个事实： 人总倾向于做熟悉和不困难之事。一旦知道后续不可捉摸，便喜欢拖延，尽管你知道这是正确的、必要的道路。 环境固然重要，心境才是根本。注意力是会被周遭分散，有人搬来屏风隔绝世界，有人只需阖上双眼——心若闹市，荒郊野岭也听得见卖糖人吆喝。所以，花费大量精力创造一个自然因素影响最小的环境，事倍功半，不如锻炼如何快速清扫内心。 折腾自有其乐趣。目的达成可喜，路途风景亦可喜。应当想象西西弗斯是幸福的，过程本身就是答案。 晨起九点多，头稍疼，心悒郁，担心感染甲流。呼气吸气，清清嗓，好在没有迹象。 意起，眼睛不愿睁开；躺下，困意却又消逝。 断断续续，梦境掠影。 住在山谷，屋前屋后满是青草，蔓延无垠。草地后见山川，但无论如何奔跑也出不去这片绿色。 人们说，快乐需要事件激发。后来，我发觉，身体好心情自好。 雨滴嗒滴嗒，于天窗之上，没有阳光。 而摩登时代的好处就是，当你环顾四周，寻不见阳光，只消INTERNET搜。像素光芒会照亮脸庞。 渐醒，女友来电，约好下午一起看纪录片，心情直线UP。 哦豁，又一个周六，启动！ 2024年01月20日15:31:56 小雨转阴 ","link":"https://yfnwu.com/post/qchxsyg/"},{"title":"M记","content":"坐在这里，人来人往，反倒能专注，怪哉。 两点多来，逛了三小时宇宙学相关，感觉却只过去一会儿。期间要了份套餐，甜筒不错，汉堡不好。 说说我对汉堡的最初记忆。 时光倒转二十年，小学三四年级。 彼时我和母亲租住在校南一栋独院，联排二层小楼。房东一家住二楼主卧，我家住一楼，两层次卧再住两家。这种情形下，所有租客和房东共用一个厨房，位于一层南侧。里面摆着一张方形木桌，通体黑色，一层反光漆。 某月某天，一张浅白色油纸包裹出现在这桌上，黑衬底，映出一面稚嫩的娃娃脸。那油纸长长方方，裹挟着奶香和沙拉味……好，就是全部记忆了。 （ps: 公共厨房但不公共吃饭，租的房间母亲放着一张桌子，一般都在自己屋里吃。） M记也好，KFC也罢。味道不记得，只知道是洋货，贵。故而吃的不多，从没印象主动去过。 后来，上大学，在西安。 第一次吃必胜客，披萨可真好吃，也是真贵，两个人吃点就得一百五六十。 便宜的有比格披萨，一人五十多，自助随便吃，四年西安，去了不下四次。 甚至研究生在北京，还去过一次。现在吃饭自由，反而吃得少，几年没自助啥的了。 写着回忆，我对面坐下一对母女，女孩约莫十岁，套着一件大红色羽绒服，两只眼睛盯着餐盘扑闪。 她妈妈打电话和某某说，我点了一份汉堡，不好吃。小女孩立马抬头冲着大声喊，好吃的！好吃的！见她妈妈还在通着话讲不好吃，自己直接下椅凑到妈妈手机旁喊，好吃着呢！哈哈哈。 麦记和肯塔基一样，孩子居多（包括我）。毕竟甜点专门捕获人类幼童，更不用说，还有玩具。 我上一次来麦记是招商银行送我早餐券，这次又抽到12抵30元代金券，不来就感觉亏了。 倒是意外发现，这里做事竟比在家更容易专注，还会再来。 之前日记主题是“早睡”，我已发觉，这将是一场旷日持久的战争。像西西弗斯无限接近于山顶，我则无限接近于早睡。 昨天周五，晚十二点半我开始看《关于时间旅行的热门问题》，看完顿悟：所谓早睡计划，不过是与平行宇宙里的自己打时间差。 去见女友，撤。 ","link":"https://yfnwu.com/post/MJ/"},{"title":"《罪与罚》临记","content":"刚刚读完罪与罚最后一卷的第六章，写 xx 是怎么一步一步走向了死亡。可以说是目前为止给我留下最深刻印象的一节了，简直是活生生的人要从故事里蹦出来一样。 他在做出自杀决定的线索之前就已埋下，在这个雨夜，他坚定了抉择。去死。结束他那无意义得不到的无趣生命。 他在某种程度可以说是善良，连在做噩梦时都在帮助小女孩儿。他把自己描绘得不堪，超出了他行为本身。 等到读完后，我要先重读这一个章节，写写全面的想法。 ","link":"https://yfnwu.com/post/zyf/"},{"title":"此去《长安三万里》","content":"我较少会为动画而去影院贡献经济，不过大唐诗文tag一出则另当别论。历史过去，诗词留下，我以为是其中少数可以称之为美和有趣的事物，读得愈多，自然想了解得愈多。 《长安三万里》全片近三个钟头，不可谓不长。其以高适视角回忆年轻时与李白相识相知几十年间故事，穿插描绘了一幅唐朝由盛转衰的历史画卷。画卷前半部分表现的不错，后半部分笔墨太少，稍差些意思。整体而言，光影设计、诗词配乐颇考究，除了情节冲突过于形式化，没有太不好的地方。 这是我作为影视观众的评论，而作为一位小说和诗词爱好者，我想聊聊其后的一些东西。 生活的不确定性与可能性 对生活的热情（或者更基础：活着的动力），会有相当一部分来源于生活本身的不确定性。这种不确定性，正是我们希望的来源。当缺少不确定性的主观认知时，人容易滑向自我放逐的深渊。 我们成长的过程就是不确定性逐渐丧失的过程，当生命中我能成为或拥有的东西慢慢清晰起来，生活的可能性则愈来愈少。具体到某个时代，我们发现，能拥有的不确定性很大程度在出生那一刻就被确定了，以至于出生于现代觉生活有无限可能的我（少年时代）眼观荧幕上高适李白等，瞅见的是天地间一座座巨大的牢笼罩在他们身上，压得他们或于故土虚掷光阴、或于他乡声色犬马、或寄情山川寻仙求道、或终日奔走只求饱食安居…… 纵观整部片子，大唐的人中龙凤们，实现自我价值之路多被局限在报效天子一途，具体操作差异无非是科举、行卷、征辟、军功等方式的不同。这是时代强加于他们的确定性。 譬如高适，青年时复兴高氏家族、沙场报国的志向确定了他生活就那么几个可能性，要么一荐功成，谋得一官半职以度余生；要么一身武艺于军中浮沉；要么什么都讨不到，黯然了却一生。当然，时代自有之不确定性也会大大影响到个人，如果不是逢上安史乱世，他可能到死也就一个从八品。 再说李白，他的可能性相比高适是被削减的。既为商人之子，科举之路便不复存。士农工商一分级，很多事情就被确定下来，普通的行卷都难如登天。他要大鹏展翅，要翱于九天之上，何其难哉。不过家境不错且从小酷爱读书，诗文才华为他撬开了更多的可能性。尽管最终还是囿于求官和求道之间，但其诗的光芒已然冲破了时代。如此天纵之才方能取得些许延伸，可见那个时代的普通人，其生活的确定性简直显而易见了。 虽然是坐在4K巨幕前的广阔大厅里，这些感觉却引发了我人生时空上的“幽闭恐惧症”。在此，我要下的定论也是显而易见了：只有向着增加人类生活可能性的方向发展的文明，才是真正进步的文明。 诗 “写诗我喜欢，可是写诗人人都会啊” 在大唐，诗是自我表达的载体，更是自我推销的介质。所以诗圈是非常之卷的，没有超人之才很难只靠诗出名。 李白在这个圈子是不世之材，普通人苦于寻章摘句、字字推敲，却常常不如他三杯两盏一气呵成。 他的诗，临摹现实的少，升华自己情绪的多。其狂放的思绪遨于九天之上，摆脱了生活的真实性，进入到理性无法触及的幻象之中。 那一首《将近酒》漫游幻象是影片最后的高潮，时空界限不再明晰，只知宇宙之大尽可去得。 万丈豪气将贯穿古今的共鸣喊了出来： “……人生得意须尽欢……千金散尽还复来……钟鼓馔玉不足贵……惟有饮者留其名……与尔同销万古愁！” 考虑到故事所讲之时，李白不可谓不处于人生之低谷。这首诗又可以做各种解读，怀才不遇的感叹也好、乐观通达的自我安慰也罢，甚至于说及时行乐的消极。 但当诗句穿风入耳，其中万千气概绝不是这些前置解读可以盖过的，此时飞翔于脑海上的是以下一些神思： “……对酒当歌……人生重于过程而非结果……浮生若梦……人终一死……莫待无花空折枝！” 这绝不是消极，这是完美契合的酒神精神啊。 曾经我问自己，诗到底是什么？ 李白给了我一个答案：当人的不确定性渐渐坍缩后，诗是我们最终能得到的胜利。 结语 以上是我对电影本身之外一些浮想。几年前我在王小波的书里看过一段论述，大体意思是影视作品由于篇幅很难表达一些深刻的东西，这往往是赋予小说的使命。执笔当下，感觉可以有一点新思路，历史和文化共同体是集体的背景故事，当世界观不需要从新建立的时候，也许存在在电影有限篇幅内表达一些更深层次事物的可能。 更新于2023年08月12日09:21:26 该文因以下慨叹而诞生： 当我面对荧幕上高适和李白的时候，发现可能性对于某个时期的特定人群来说，是一件很奢侈的东西。囿于时代和出身，他们所能面对的选择，相当之少。空有一番才华抱负，却寻路无门，无处施展。 ","link":"https://yfnwu.com/post/caswl/"},{"title":"雨行","content":"二零二三年七月二十三日 星期六 多云转阴 连续几个周末没有骑远些，翻开地图，傍晚决定往韶山公园一游。 约莫十三公里，来回预计一个半小时。 出发时看天气，未来两小时降雨概率50%，结合近期预报表现，我估摸大概率一点阵雨，就啥也没带，头一闷，出发。 小区门外看蓝天，在东方，西边天上云层层叠叠，太阳掩映其后，云下暗色。 目的地往西去，我便冲向漫天乌云。 行进不过三十分钟，点滴雨水就砸到了脸上。风有些大，我想，这应是阵云下来的雨，很快就能过去。便倚着路侧树荫，帮助遮挡一些，同时提速往前。就剩三公里了。 然而，雨不见小。我等红灯时，前前后后雨如幕。 骑行以来，还没有过不到目的地就决意回头之事。 便再次提速，行入最后一公里。 越过一座小桥，沿岸而行，几乎不见车和人。我眯着眼，努力不让雨水直接撞入眼睛里。三分钟未到，车已到韶山公园大门。这像一座山门。层层台阶，几乎没有人出入。对门是树林掩映的一小方广场，我到的时候还有些人，匆匆忙忙收拾离开。 雨滴愈来愈密。我站车旁，往上看看山门，来这一次，总得进下门吧，不过这么大的雨，想上山是不可能了，况且车还没带锁。 雷声轰隆，雨水慢慢下如瀑。 我回身把车忙推到对面广场旁一户人家侧窗下避雨。抬头发现天已完全被乌云覆没。偶有紫色或白色的闪电照亮层层云体。 我背部紧贴墙壁，把自行车横过来靠着大腿，也完全抵挡不住雨水侵袭。风声轰隆，眼前的小片树林发出一阵又一阵呜咽。 林子中间的那个小广场，高悬着一条红横幅，写了什么不清晰，但平时不反光的材质现在竟一闪一闪亮。该是雨水完全浸润透了它，在它表面连续形成一层水膜，遇到合适角度，就把一旁路灯的光亮反射到我眼里。 树林南侧就是韶山公园山门，石阶级数相当地多，阶棱破残之处在雨水淌动中凸显出了它们的存在，仿佛诉说，这样的场景，它们可见得多啦。雨愈来愈大，石阶上开始起浪，一波一波往阶下涌，把我迷住了。只注意过雨水缓缓流，何曾闻见浪打阶。 闪电愈来愈密，雷声愈来愈近。 树林北侧是跨桥来的那条河，对岸有楼屋林立，在热闹街边。说它热闹，是这样的雨夜，仍有接连不绝的汽车飞驰而过，我听不到声响，但望见许许多多闪动的光路。 我低头看手机天气预测，这一大片雨云八点多才会离开，现在七点半，我还得至少等上半小时。 眼前的树林忽地一瞬间如同白昼，再一声“轰——隆——” 猛雷在我斜后方的天空炸响。然后几秒一个或一两分钟一个，连绵不绝。我立住车子，从这个窗台下跑去近河墙角，扫察更阔夜空，希望能够捕捉到闪电。 目光正中央正好出现一道很难，大多在眼角偷袭。我看见河流向的远方有一丛丛黑山头，闪电下显露它们暗绿色的身躯。风夹雨滴顺着临河墙壁向我打来，好一幅夜雨山电图！ 一道紫色电光横跨三分之一天空，分岔出细密小枝，只在刹那间，根本来不及让我确认它是否是真实存在。好在还有随后的雷声证明。大概6s之后轰响耳际，也就是说，发生地距离我大约2KM，看来它们开始跑远了呢。 果不其然，风仍大，但淋到脸上的雨滴可感地减少。 此时已经七点五十，身体淋湿了一部分，不住发抖，可不能冻感冒了啊。 我一咬牙，不能拖，趁雨势转弱，不如归去。 于是，封好手机，跨身上车，上锁，回家。 天公善良，骑着骑着，身上暖和起来，雨愈来愈小。 到家时，雨已停。 热水澡一冲，畅快。 后记一：卧室天窗没关，这是我主观失策，不注重天气预报，存侥幸心理，竟在夏季黄昏开着窗出门行。好在雨虽大，进来的量应不多，地板上有明显水积，一拖干净。床垫一摸，不是很湿。一小片无妨休息。 后记二：周一上班时，发现车链变黄，是大面积生锈。那天地面雨水累积较深，把车链润滑油都给冲干净了，当时没有注意。周一晚上用牙刷和牙膏完完全全清洗了下，重新上油，得到新的经验，倒没那么嫌累了。 ","link":"https://yfnwu.com/post/yzqc/"},{"title":"像云像雾又像闪电","content":"五年前我上大三，去了一趟青海湖。西进途中，在兰州靠停时，大概晚八点，上来一位二十七八岁模样的小伙子，在我对铺。六个铺，就我们俩，自然就攀谈起来。 他说他叫胡笑生，生于苏，长于苏，久做江南打工人，此来一番，是要见识见识祖国大西北。我点头称是，我就在长安读书，西北确不同东南，值一大观，巴拉巴拉。古今上下地侃一通，渐渐熟络。 卧铺车厢十点熄灯，之后，仍零星有灯光从窗帘的间隙跑进来。我双手交叉枕在头下，抬眼从间隙里看天空的云，近处多灰白，远处有昏黄色，那是城市的灯光映照到这些幕布上了。 对铺的笑生也瞅着那些变色云，小声跟我讲，他以前独自在南方一座小镇打工的时候，租住的房子在一座大桥边，每至夜，桥上的各色灯光便播散出来。那时他喜欢捧着一本电纸书，倚靠栏杆，感受江畔微风习来，沉浸读着小说，偶有抬头舒展脖颈，巧遇飘过低空的云，那云下映衬的桥上的光，一朵朵色彩缤纷。多好哇，他说，读个小说竟能读到诗意从胸腔升起，真是美妙。 我说，你和一般人发掘美的方式似乎不太一样，但我觉着很有意思。 他说，哈哈哈，其实都是私人的体验，瞬时的感受无法言语传达，也许是心情愉悦所以看什么都舒畅也说不定。 但怎么说呢，我挺喜欢用一件事物去绑定当时的心情的。 啥意思？我问。 比如，我遇到特别开心事情的时候正好听着一首蛮不错的歌，一叠加我更开心了。最关键的是，以后，我再次听到这首歌的时候，它能够把我那时开心的感觉给带回来，让我能够穿越回那个瞬间，就特别好。 嗯深有同感，跟古诗文中的意向一个道理，不过这个意向是你自己创造和关联的，可以带来开心，当然，也避免不了回忆痛苦。 痛苦…笑生的声音更小下去。沉默一阵，忽地问我，你见过云层后面的闪电吗？ 什么意思啊，很多闪电不都是在云后面吗？ 不是，我给你描述下：就好像夏天的夜晚，你站的地方近处没有云也没有雨，而在远方的天空有山一般叠起的云，在云的后面，不时闪出几道细线强光，然后隔上好几秒才回听到轰隆隆的雷声的那种。 那没有，一般我见到的雷和雨都比较近了，还真没这种隔岸观闪电的经历。 我也就见过一次，还是在那座小镇，很漂亮，会给人一直置身事外的轻松感，但是，我宁愿我没有见过。 为什么？ 它和一次分别的感觉绑定了。 哦，失恋？ 不是…根本就没有谈过。 那你失落啥？ 因为比谈过还痛苦。不过，都过去了，我只是痛惜，这种景色来得可真不是时候。 哈哈，至少你看到了，体验过了，不像我这个只能通过你的描述感受下的人。那句话咋说来着，途径盛开总比沿途啥也没有好。 我咋没听过，你瞎编的吧。没事儿，用不着安慰，我还是挺感谢她的。 感谢？有故事啊，说来听听。 嗐，老哥，你是要扒我的伤口啊。而且，这种故事，没有酒可听不了。 哟，你小子还装起来了…… 话音未落，忽然一阵嘎吱嘎吱声从前后车厢连接处传来，一般车转向的时候会发出这样的声音，但怎么能这么响。我们坐起四目相对，眉头皱了起来。我所在的车厢人很少，尤其这六个铺位才我和笑生俩，有序的寂静被打破，笑生首先伸腿下床，他是要穿鞋出去看看了。 我没吭声，就望着他消失在走道车窗右侧，心里感觉到奇怪，车又没停，他这么急着去看什么。 我躺下眼瞧着窗外天空快速变化，远方的昏黄色也移去看不到了，我在想那座南方小镇，似乎小时候我去过。 后来，我睡着了，在半梦半醒之间，感觉火车前后晃动一下，停了。 此时，天还未亮，窗外仍是漆黑，走廊的灯光勉强使我能看到对铺。惺忪的双眼望过去，被子已经叠好了，整齐地好像没有人休息过一样。 就这么不告而辞了吗，鼻翼下气息缓缓释出，有失落的味道。 我趿拉着凉鞋，起身拐去洗手间。小掬一掌凉水，扑了扑脸，抬头发现笑生赫然在看着我，他沾了水的睫毛下有着各色光芒，像云像雾又像闪电。 我们同举起一只手， 初见也是再见，别过，少年。 一天清晨，朦胧中一个名字跑进我的脑海，他就是胡笑生。我不知道是怎么认识他的，但我知道他。 我把他写得很生硬，尚待修改。 最后更新时间 2023年06月22日00:38:47 ","link":"https://yfnwu.com/post/hxs01/"},{"title":"Valine折腾再记 ","content":"再次很长很长一段时间没有维护博客，收到阿里云续费的邮件才想起。打开发现，Valine 又无了。 ps: 小立一个FLAG，近期慢慢恢复更新，生活这首歌即将变奏~ 问题 Valine 评论失败，FQ后可以评论成功。 排查 访问 suyi.avosapps.us 评论管理界面直接 Access denied Error code 1020，我的ip大概不会有问题，那就是被墙了。 查到信息“leancloud 的国际版共享域名将于 2022 年 8 月 1 日起不再向中国大陆的最终用户提供服务，国际版共享域名仅服务于海外用户。” 即 2022 年 8 月 1 日以后，国内的 IP 无法通过共享域名调用国际版的数据存储、即时通信、云引擎等全部服务，请求会响应错误码 1020。 解决 直接更换为新的评论系统（看有很多人推 Waline，配置起来还是比较简单的，但看了下上手，还是基于leancloud进行数据管理，所以其实是同样的问题） 所以如果还用leancloud，查到以下两种方式： 应用数据迁移到leancloud国内版：因为我的域名已经有备案了，leancloud 再从国际版转回来也可以继续用，评论和阅读统计数据库也能接上。 leancloud国际版绑定自己的域名（域名绑定指南）：基于Valine使用，只需要在控制台绑定 API 自定义域名即可。（需要注意，如果你在 2020 年 10 月之前绑定过自定义域名，需要修改域名解析至控制台上显示的最新的 CNAME 地址，否则从中国大陆的访问会被禁止。 ） 现状 懒得更换了，选择了最方便的绑定域名方式。Valine评论系统已于2023年8月12日恢复使用，访问记录重新更新。 网站邮箱👇 yangfannwu@126.com 更新于2023年08月12日10:07:50","link":"https://yfnwu.com/post/ValineGT/"},{"title":"从《超能查派》聊开去","content":"我自 2013 年起念大学，四年倏忽过，说实在的，去影院看过的电影并不算多。《超能查派》就是其中之一。 今天是 2023了，为什么要提起这部八年前的电影呢？首先说明，我是一名科幻爱好者，各种类型的小说自不必说，影视化的作品也观阅良多。如今 ChatGPT 热潮滚滚，使我联想到了这部片子。当然，还有另外的缘由可供补充，第一次被女孩子邀请去看科幻片，哪能不印象深刻。多年后回想，总觉得这种感受来得太晚了些。 电影简单讲，是关于人工智能成长的故事。传统机器人只会机械式执行命令，而我们的主角查派则是拥有人工智能CODE，自主学习迅速成长。影片最后，在查派的帮助下，人类角色机械飞升，将意识转进机械大脑了。 桥段并不很新鲜，在这方面是不能够与小说相比的。 但换个角度看，这部电影对人工智能的想象，代表了一部分典型机械智能观。 说白了，其实质就是将一个人类幼体塞入了机械外壳之中。初生之时，一片空白，凭借机械赋予其极强的学习能力，只需短暂地接触外界信息，各方面能力就大幅超越人类。 编程输入一些规则后让电脑产生自我意识，以及探索世界的动力。这种逻辑细想不大对头，但鉴于我们本身对于意识是什么还没有一个定论，所以也不无可能。（说到这儿，我想起《失控玩家》。这部影片讲了人工智能的自我意识觉醒，具体表现是受到无法预知的输入，导致思维过载产生对世界的怀疑。假如我们处于一个虚假的世界，在被设定好的规则下生活，确实很难发现自由意志是假的。所谓意识，也只是提前被设计好的而已。打住，扯远了。） 昨天还看了《超验骇客》，评分不高，片荒拿出来瞅瞅。讲的是人类面对强人工智能的故事，这里面的人工智能，据我不负责任的推断，就类似于如今 ChatGPT 式天量数据训练的神经网络深度学习模式，电影本身阐述的重点当然不是这个，它着重于这种人工智能没有善恶的价值判断体系，拥有的自我意识也是靠人类意识复制上传形成的，因人之欲望而有了行动的动力。 现在转头来看 ChatGPT。在体验上，和以往所有的智能助手都有显著差异。它似乎真具备了理解你说话的能力。现有说法讲，这种能力是涌现而来的。也就是说，特定的神经网络模型经过海量数据输入输出训练，当数据量超越某一阈值，模型就突然出现了之前完全不具备的能力。 “涌现”名词可作如下解释： 设P是一个复杂事物x的属性，而不是x的组成部分。（1）如果P是x的某些组成部分的属性，则P是合成的或遗传的;（2）否则，即如果x的任何组成部分都不拥有P，那么，P是涌现的、集体的、系统的或完形的。 ChatGPT最初的模型是单字接龙，把输入不断迭代以计算下一字的概率。这样听着简单的机制能达到目前的效果确实很神奇。就涌现发生的具体方式，我们还不得而知。 资料显示，训练模型的材料，是经过人工标注的人类提问&amp;回答的语料。可能输入与输出之间的模型参数的不断增长，让从特殊之中总结普遍性原则的模式（或者说隐藏在语料之后的逻辑推理模式，被参数凸显并保留）形成了某种运作的层级，量变达成我们看到的质变。 人类也可视为典型的输入输出系统。而且我们接收的信息量巨多，自出生起，声音、画面信息就不断输入到大脑皮层上。意识能理解的尽管不多，但不可否认，我们对自己的输出也不都了解。类比而言，大脑的神经元就是神经网络模型的参数聚集体，人的意识就是各种细胞聚合的涌现。而我们，无时无刻不处在被训练之中。 再回到神经网络模型生成式智能，这种形式的人工智能是否就是通向强人工智能的正确道路，我不知道，但我非常之激动。 因为之所以喜欢科幻，其中必然有一点：人来到这个世界上，能够体验和感受的实在是太有限了。往前，我可以读历史，人类在过去几万年的进化跨度其实并不特别大。工具的使用效率在提高，但是线性可预测。再看近几十年，爆炸式的科技发展，让我非常渴望了解几百年后人类社会是个什么样子。 行文至此，就欲结束。其实从《超能查派》聊开去的这些事物，纯属瞎聊，我非专业人士，想要了解人工智能或者当下AIGC原理及发展的自去找找权威资料读读。我所要表达的，一句话也能作结： 无数杰出的头脑在思考和探索，我站在他们的肩膀上眺望，仍然觉得能够拥有的现实非常之少。 《超能查派》，人工智能是个具有学习能力的人类幼崽。《失控玩家》则未提及其智能模式，形式上是个掉入日常重复生活模式的中年人。《超验骇客》则让人工智能纯粹是个思考和计算的工具，在人类的意识主导下，才有了主观能动性。 最后更新时间：2023年07月04日00:22:18 ","link":"https://yfnwu.com/post/cncp/"},{"title":"图床搭建（阿里云OSS+PicGo）","content":"一直用的SM.MS，体验还不错。加载慢，不过图少，就没在意。但这次站点迁移，买了阿里云OSS服务，本着不用白不用的原则，重新搭个图床。 （2023年8月9日19:48:14更新：已停用，防盗链都挡不住的恶意刷流量，一觉醒来一套房子没了.jpg 本篇文章的所有图片链接就是最好的打脸） 阿里云OSS开通 网站：阿里云 路径：产品 —— 存储 —— 基础存储服务 —— 对象存储OSS 立即开通，确认即可 折扣套餐40GB一年9元，相当划算。否则按流量计费，也不是很贵。 创建Bucket 控制台进入对象存储OSS 点击创建Bucket 注意读写权限 改为 公共读 即可 点击确定，创建完成 创建用户 访问控制 创建用户 点击确定，手机验证下就可以通过了（记住ID和Secret） 还有一步添加权限 点击确定即可 配置PicGo 下载PicGo 图床设置选择阿里云OSS 红框内必填（注意：复制ID和Key时，前面要检查无空格） 确定并设为默认图床 配置完成 配置Typora 很多朋友用Typora写作，为方便可直接在偏好设置里选择PicGo上传图片，可以自动转换链接 ps: “上传服务”也可选“PicGo-Core(command line)”，会少占计算资源（已有APP，故未尝试） ","link":"https://yfnwu.com/post/tcdj/"},{"title":"舟行记（二）","content":"寻找蔚蓝 晨起开窗有阳光，预示这一天的日落有了希望。 由普陀渡至东极，全程近三小时，途中小憩，甚是香甜。醒来精神无比，出舱门又见阳光洒在甲板上，喜悦更甚。 “太阳出来了，所有的忧愁都像雾一样散开了。” 我举头看太阳、看云，低头看大海、看被船劈开的浪花，用脸庞去撞击海风，对于初见，不贪婪是种罪过。 远远地岛来了。我们聚到顶层甲板，一字排开，或倚栏杆，或靠舱壁，电子眼记录的同时，发现海水忽然变蓝，这让我有一种旅程才正式开始的错觉。之前听余华说，他年少时候，看书上讲海水是蓝色的，但他家（海盐）附近的是黄的，所以有一天他就往大海深处游，想一直游到海水变蓝。我俯观眼前的蓝色，这么近又这么远，那一夜孤独地游在黄水之中的余华，他在想些什么呢？或许他已不再记得，但可以肯定的是，后来每次见海蓝时候，他必会忆起那个暗夜里划向大海深处的自己。 我们在黄昏时分登岛，日落被云层遮扰，但我知道不必感伤，因为清晨的希望与喜悦足够补偿。 环岛徒步 日出东南隅，照我鸿福楼。 所住的旅舍三层上有一露天平台，起身穿过对门的空房间，八点阳光下是正梳妆的丽人。 你以为我要一一叙述今天的步程？ 不不不，那样一点都不好玩。 就像回忆，使你记忆最深刻的，一定是你当时感受最多的那个时刻。 在这一天，每当想到：这座岛离城市很远很远，四面环绕的是无垠的浅蓝，太平洋的海风从东面吹来，明早还很可能邂逅这个国家最早的晨曦…我就如同在寂静旷野中听闻一声呐喊，束缚尽去，亦不孤单。 那么海边有什么意象呢？ 礁石 久久地凝望着，一块暗黑色礁石。它离岸最远，一小半没在水中，潮涨潮落，它的身上留下了深浅不一的纹痕。我不清楚这个岛诞生了有多久，或许，这块石头已被拍打了上万年，久到我与它的相遇都算不上一瞬，但浪起拍击的声音于我来说，重复重复就是永恒。 我看到远处小小礁石群上，小小的人，钓者也。他们起于拂晓，沐于晨风，未闻高歌前夜酒，一丈丝纶一寸钩。可能，我尚未到体会垂钓乐趣的年纪，然独钓一春海之美毋庸置疑。 巨石 攀至山顶，转过一片灌木丛，可以见到天然堆砌的巨石，像是战神四里最后巨人国度那恢弘群山的一员。 非是嶙峋怪石，多是一整块一整块的，表面百分之八十以上裸露在外，无草木之遮掩，无青苔之攀附，显出它最本质的样子，让人自感身之渺小。 当然，再强壮亦抵不过岁月漫长，即使最坚韧的巨石，凑近观察，星星点点都是蚀痕。 悬崖 立于巨石之巅，两侧都是百丈深谷，双腿不由自主地微颤，肾上腺素极速分泌。我知道，在此处，呐喊一声，能传到很远的地方。可当我喊出的时候，发现那并非我本来的声音。世界如此清晰，喉咙却不受控制，我体会到了一种转瞬即逝的痛苦。 而后是心脏蹦跳的惊喜。 “我总觉得大多数人这样度过一生好像欠缺点什么。我承认这种生活的社会价值，我也看到了它的井然有序的幸福，但是我的血液里却有一种强烈的愿望，渴望一种更狂放不羁的旅途。我的心渴望一种更加惊险的生活。” 尽管远远不至于加缪所说的狂放不羁，但脱出庸常生活，瞥见惊险一隅，是感受存在的新体验。 落日 爱在日落黄昏时。貌似是一部影片名，就冲这个，有机会一定要看它一遍。 顺时针环岛的好处就是，最后一大段全是平坦公路，要知道，之前的石头山路有多难走，踏上柏油路的心情就有多愉悦。 日渐西斜，拢向海面，其下不是我平日清晨从江面观赏到的粼粼波光，而是映照下一条从岸边铺向海平线的金光大道。 疲乏的身体此刻竟迸发出惬意的感受，诗意烂漫，所谓浪漫。 “她微笑着，阳光照在她可爱的脸上，透过雪光和阳光抹上的棕色。身段很美，头发在阳光中金里透红。一个冬天就变了模样，但很好看。” 驶向另一个我 运气不会一直眷顾。这个道理，我从小就明白。只是，站在岸边，阴云密布于头顶并延伸到远方的时候，还是有那么一丝丝遗憾。 离岛的客船缓缓驶出港口，亦如来时的模样。我举着运动相机，与同伴一道倚在栏杆上，记录逐渐远去的风景。 我已不再考虑什么再不再见，这段体验必然会过去，我们总归要回归日常。 然而可以肯定的是，我必定已不是来时的我，如巴迪欧所说： “远行和流浪只是一个概念而已，你们迷失了方向，但你们最终走向的是你们自己。” 不知行至何处，醒来上甲板，前后茫茫，我什么也望不见，不过手臂的温暖告诉我，真正的生活 / 永远才 / 刚刚开始。 ","link":"https://yfnwu.com/post/xzwl2/"},{"title":"舟行记（一）","content":"我望见远方的海岛，客船劈开碧波，从一个我驶向另一个我。 二零二二四月三十 生活唯一之确定在于它永远不确定。 前夜预报有雨，早八点出门时候，看天，转阴。喏伞，这几天，家就交予你了。 下楼穿街过桥，来到预定集合点。目的首地舟山本岛，载一车人声，我们陆路跨海上岛。此行想法已久，预谋一周，起始三人，在倒数放假的日子里，竟涨至七人之多，两三还是初见，旅程新鲜度顿时拉满。 我们租住的酒店矗立于岸边。站上二十三层的阳台，猛然一阵海风从右侧袭来，让我听它的声音。顺着风向，我先看到了城市从近处连绵至青山之下，转头在风中见到浑色的大海。今天运气不错，雨并未落下来，仅是天阴，海面弥散着薄雾，方才驶过的跨海桥伸展于朦胧。此时我接到来自故乡的视讯，兴奋地述说起异乡颜色来。 驱车行中，感慨于山青水绿空气鲜，司机师傅却全然不屑一听的口吻，倒也理解，见惯了嘛。如今我们的旅行，去的多是专门建设过的景点，所谓从你自己活到厌的地方旅到别人活到厌的地方的现代行。兰波有诗云： “看透了，形形色色的嘴脸一览无余； 受够了，城市的喧嚣，黄昏与白昼，日复一日； 见多了，人生的驿站； 噢，喧嚣与幻象！ 出发，到新的爱与新的喧闹中去！” 这是他逃离故乡的宣言，从某种意义上来讲，旅行和逃离确实有很多重叠感受。 我们安顿好行李和肚子后，已近午后两点。云多且未自驾，权衡后便抛弃大青山，准备去个公园消遣一番，五点再去南沙。 出发，到新的爱与新的喧闹中去！ 我的头发与野蜂很是搏斗了一番才得到进园的机会，好在奖励不错。走至半途，与印象普陀专场表演不期而遇。 舞台连着观众席，席两侧外墙全部包裹着鳞片似的银色金属，后来演出到第二个节目，才发觉这是前有耳闻、今番初见的三百六十度旋转剧场。 此时此刻，下有亭台楼阁、池水涟漪；中有翠绿春林夹杂斑驳巨石；上有郎朗清风从山间拂来，我把后背托付给椅背，静心感受着这自然与人间所合奏的新的喧闹。 再后来，步不移景却在匀速变换，舞者们鱼贯而上雁行而下，最后，一支盛大的舞开始了。恍惚间加入其中：我是人间的游客，偶然进到一场庆节，观察着、模仿着，在人们相互依偎的时刻，转身离去。 去往何方？去往清风拂来的方向。 山不在高，仙也不少。穿卧龙、清凉洞，便可踏上木鱼石，见八戒望海不见龙女之石；下转小径路过天险石，登说法台盘腿而坐，闭目而觉心旷，这种地方冥想，心想不静都不成；之后循关道往最高点而去——观音跳海石（都是些神仙石头哈哈），此石大而扁平，攀上即感风之猛烈，我忙不迭扯紧上身那件四面漏风的黑色牛仔，蹦跳过观音脚印，顶到石头最前方。映入眼帘一片平静，山脚湖泊之寂蓝尤得我心，我爬上这块石头的最高处坐下来，俯见同伴们在把风景和人剪进相机里，凛冽风声中听语笑喧阗，真是人间好时节。 自不必说，海鲜是那天的晚餐。我回忆美食味道并不在行，但记得学到的常识：吃海鲜最好不要喝橙汁。从举杯同饮到干瞪眼发完最后一张牌，时间总是在开心的时候疯狂加速。 ","link":"https://yfnwu.com/post/xzwl/"},{"title":"Valine评论异常解决","content":"博客由于加载原因关了一段时间，今天发现不但之前的评论消失，而且新评论总显示无法提交。 解决方案 首先 Valine项目 确定正常运行 https://cdn.jsdelivr.net/npm/valine@1.4.16/dist/Valine.min.js 访问也没有任何问题 考虑到Valine是基于LeanCloud建立起的评论系统，登录LeanCloud看官方无改动 果然： 公告 us-api.leancloud.cn 已下线 1月17日 为了简化配置、提升系统稳定性，以及满足合规性要求，LeanCloud 国际版的 us-api.leancloud.cn 已于 2021 年 11 月 23 日下线。国际版已于 2019 年 1 月 1 日正式独立运营，且独立运营之前很长一段时间 SDK 早已采用根据应用 ID 生成的子域名作为 API 入口，不再使用 us.api.leancloud.cn。因此除了还在使用版本非常老的 SDK 的应用外，绝大部分开发者不受影响，不需要进行任何操作。如遇到问题，请点击「查看详情」了解如何更新 SDK 或 SDK 初始化配置。 也就是LeanCloud对 us-api.leancloud.cn 的域名不再维护了，用这个域名去读取和添加数据必然是无效的，得指定自定义服务器URL才能使用。 方法如下： 自定义URL：登录LeanCloud，找到应用，进设置，应用凭证，服务器地址下面有一个 REST API 服务器地址，复制备用； Valine配置修改：添加一行 serverURLs: 'https://xxxxxxxx.api.lncldglobal.com' （ps: xxxxxxxx就是Appid的前八位字符）； 示例： &lt;script&gt; new Valine({ el: '#vcomments', appId: '&lt;%= site.customConfig.appID %&gt;', appKey: '&lt;%= site.customConfig.appKey %&gt;', avatar: '&lt;%= site.customConfig.avatar %&gt;', placeholder: '&lt;%= site.customConfig.placeholder %&gt;', pageSize: '&lt;%= site.customConfig.pageSize %&gt;', lang: '&lt;%= site.customConfig.lang %&gt;', enableQQ: 'true' === '&lt;%= site.customConfig.enableQQ %&gt;', visitor: 'true' === '&lt;%= site.customConfig.visitor %&gt;', highlight: 'true' === '&lt;%= site.customConfig.highlight %&gt;', avatarForce: 'true' === '&lt;%= site.customConfig.avatarForce %&gt;', serverURLs: 'https://xxxxxxxx.api.lncldglobal.com' }); &lt;/script&gt; 重新部署即可。 ps: notice 'xxxx' Server酱 微信推送版本升级 再进行评论Test时，发现Server酱更新，公告旧版API随时可能下线，那自然要换了。 原先推送设置参考的 这篇文章 所以要做的就很明确了： 获取新的 sendkey：登录新版Server酱 ，复制sendkey备用； 更改环境变量：登录LeanCloud，云引擎，设置，源码部署下面将原来的 SCKEY 变量重新赋予前边复制好的值，保存； 改request地址： 这里发生一个尴尬的问题，当初我是直接调用sviptzk的仓库部署的，现在发现404了😂。于是，重新找了一个Valine-Admin-Server，fork了下 https://github.com/yangfanbit/Valine-Admin-Server），sendmail的js推送url改成sctapi就行，如下： 重新部署，使环境变量生效； 测试： Bingo! ","link":"https://yfnwu.com/post/Valine/"},{"title":"原野上亮起一盏灯","content":"去年六月时回乡偶记 倚着车窗 风声充斥耳蜗 诉说此夜如何寂静 车里人们 低语徘徊 仿佛是旧日的回声 侧身眺望 苍穹蓝黑 原野安详 它将群树伸入暗夜 染上影绰的黑 成一套新衣裳 倏忽之间 星驶入怀 于是 原野上亮起一盏灯 凝聚而又细长 ","link":"https://yfnwu.com/post/yyslqyzd/"},{"title":"爱具体的人","content":"说来好笑，做了一些梦，让我猛然体悟到多年前的行为所造成的影响。有坏的，可能也有好的，但更多的是坏的。如今我自己成为了接受方，一次又一次受着所谓煎熬时，我才深知，年少无知爱地抽象有多么地伤人。对不起。 这些年，我一直一直对自己说，要诚挚地生活。很多词我学的时候不明所以，真正用到了，才知道，这一个词，就得学一辈子。 梦境的记忆开始时七零八碎，现在则只剩浮光掠影。周末的两天，给自己安排的活儿没能干完，还累得够呛，在凌晨雨敲天窗的半睡半醒间，有一些画面溜达进我的意识。曲调婉转，一步一惊，一步一喜。从前梦到亲人的逝去，理性告诉我那只是潜意识的忧心，不足多虑，多联系联系，互相关注下就好。可是，梦中，我未曾谋面，现实中不曾存在与我之联结的人物，因为荒谬绝伦的原因，脸色青紫，唇齿苍白。 （这个原因和梦中联结，我没有机会也不好意思表述出来，这不是《忏悔录》，况且事件本就是虚幻。） 但是，但是。画面和感受像一只尖锐而柔软的爪子，完完全全攫住了我的心。怎么可以有这样的梦，怎么能有这样的梦，这样的梦为什么会发生在我人生的这个时刻？！ 清晨，一堆云母片似的云遮蔽了东南角的天空，阳光从小径一样的云缝中跑出来，落在江面上，翻成点点银光。我走在桥上，想着这个梦。又抬头看灰月，刚才还在云间，怎么瞬间就跑到广阔的蓝天之中了？荒谬，简直是荒谬！这个世界好像是假的一样哎。我何德何能，要赐给我这样一个梦！ 大三时候看《梦的解析》，记得有一章的标题“梦是欲望的满足”，我当时还挺赞同的，许多梦中意向，其实都可以找到现实生活的原型（物质OR精神）。这次的梦，我却怎么也解释不了。或许这个荒谬的场景，是我从一则新闻听来，埋伏进了我的潜意识，在人生这样的时刻，它钻了出来，给了我任哪个现实编剧都编不出的转折。真·降维打击，实在太过荒唐了啊。 傍晚，下桥的时候，我突然回忆起了一些事情。跟梦境，可以说是风马牛不相及也。但其间，似乎有一丝细微的情感链接在摇荡。我将自己代入对方，这是承受了多少失望和委屈啊！在TA面前，那时我有如稚气的孩童一般，爱意无限汹涌，却落不到具体的人身上，沉浸在对自我幻想人格的追求中。或许对一些人来说，踏出的那些步伐并不困难，沉没成本也算不了什么，但于我，近来才体味到，这种勇气，这种不惧怕一切开始的勇气，才是对自己真真正正的诚挚：不受借口诱惑、拒绝自我设限、努力顺心而走、失败接受、痛苦承受……原来，并非TA来追随我，而是TA在用宝贵的时光教一个顽童，你该去爱具体的人。 一系列需要抉择的事件接踵而来，我感到惶惑不安，有未知的恐惧、有失败的担忧。思虑很多，常常想我能为这个世界创造点什么，却几乎遗漏了身边具体的人需要什么。也许站在悬崖之上，人往往能够快速地反省一生。而我很幸运，上下桥之间，世界为之一变。 （注意力的转向是真的需要机遇和运气！） 前天天气预报说，明天大雪；昨天说，明天中雪；刚翻了下手机，明天雨夹雪。哈哈，可谓是春天具象化的步伐。在此，祝愿世间众生，所拥之爱，皆为具体之人。 晚安。 ","link":"https://yfnwu.com/post/ajtdr/"},{"title":"再读《献给阿尔吉侬的花束》","content":" 有些常识的人都会记得，眼睛的困惑有两种，也来自两种起因，不是因为走出光明，就是因为走进光明…………他可能想嘲笑从幽冥走进光明的灵魂，但这总比嘲笑从光明世界回到黑暗洞穴的人更有道理。 阿尔吉侬是一只老鼠，一只有过 极高智力 的老鼠。为什么说有过呢，因为这段体验在其生命中并不长久，简而言之，手术效果并非是永久性的。我们的主角查理·高登，一位低智能的人，在这只老鼠智力奇迹诞生同时，亲身第一个复刻了它，但伴随着阿尔吉侬的衰退预兆，经历了一番智商过山车式生活体验。这本书就是日记形式的体验记录。 很早之前，大概是大四的时候，读过电子版。书的标题也是《献给阿尔吉侬的花束》，不同的是，那是一本科幻合集，以至于作为题目的这个故事本身，并未给我留下太深的印象。合集里故事很多，情节不再记得，但使我年年不忘的是当时的感受：震撼、落寞、宏大、温情……时隔四年，网购时为了凑单，它忽地蹿到我脑海里，便买了回来。 好久不见啊，查理·高登。 有时，知道的多并不是一件那么开心的事，是吧。 你什么都搞不懂的时候，有很多朋友，快乐是发自内心的，因为你真的是这样认为，毕竟体验是第一人称，心情你自己说了算。 后来，在攀登智商山峰的路上，你慢慢看懂了经历的世俗真相，痛苦于是随之而来。怒不可遏、难以接受，真实残酷而又无法避免。 再然后，智力急剧衰退，尽管你的内心因而悲痛不已，周遭环境却在变回之前给你带来快乐的样子，好像你重新获得了主观的幸福。 （我想起了眼睛的困惑。嘲笑走进光明的是限于自身认知，嘲笑走出光明的是不想成长的庸碌，两者都不高明，但前者更多的是无奈，后者却是以此为荣了。） 这带来一个问题：无知，也是一种幸福吗？ 我很想给一个肯定的答案，可是不能。 现在的我，连自我的存在都不能明确，世界在我看来混沌无比，没有清晰的脉络展现，很多人在其中浑浑噩噩。不清楚这一点的人在某种意义上是幸福的，知道这一点找不到破解之法的人也着实痛苦。最难受的是左右摇摆的人。纠结的痛苦，消耗精力、消耗时光，最后一无所成。 当然，这也可能是我一厢情愿的推测，人类思维存在的局限就是只能通过已有经验去描述未知。我们观察、思考，下结论的时候却总也避免不了推己及人，兴许大家并不是跟我想象的一样，兴许大家感知世界的角度本就是千奇百怪，可是作为人类普通一员的我，对此永远没办法确定。 在思考的过程中，我也意识到思考本身的问题。 一件事情给我一个模糊的感受，产生朦胧的初步认知。我以为，理性会开始分析，并给出结论。可事实并非如此。挺多时候，我心中已有一个结论，但完全没有分析过程，经常是不自觉地去为这个结论找支撑材料，找共鸣，找理由，以此来说服自己：就它吧。（选择多或少都会如此） 所以道理我们不常用来指导行动，而频繁用来合理化直觉或已经发生的行动。 在“便匆明”的日子里，大家或多或少都把他当成了异人。要知道，他最初便匆明的渴望就只是想让他的朋友们更加喜欢他而已，结果呢，他却失去了所有的朋友。 “拜托...拜托不...不要让我忘记怎么读和写... 这种绝望和心酸，大概只有阿尔吉侬能理解吧。 当我们见识过光明之灿烂，谁又会愿意重返黑暗的幽深呢？ ","link":"https://yfnwu.com/post/dxgaejndhs/"},{"title":"人间离别少","content":"今天读到晏殊一首《踏莎行》 碧海无波，瑶台有路。思量便合双飞去。当时轻别意中人，山长水远知何处。 绮席凝尘，香闺掩雾。红笺小字凭谁附。高楼目尽欲黄昏，梧桐叶上萧萧雨。 关于“聚散”这个话题，真真是经久不衰。就读过的诗词而言，以为形式上可分以下几种（参考高老师）： 一、“聚散真容易” 相见和别离，都是如此容易且匆匆。这种慨叹极为常见。 该句出自晏几道的《蝶恋花》，原文“春梦秋云，聚散真容易”。春梦秋云，代指美好而短暂易逝之物。可以从他父亲晏殊的词里找到出处“长于春梦几多时，散似秋云无觅处”。当然，我们最先想到多是白居易那句“来如春梦几多时，去似朝云无觅处”。概是晏殊借鉴之句。 词人“少年情事老来悲”，用春梦秋云形容聚散之无常。深夜灯下一杯酒，难免往事落心头。所以说这是最寻常的一种，孤怀难谴之时，从前美好而又短暂的邂逅（非定物或定人）浮现眼前，叹一句“聚散真容易”，当下悲郁之心情似乎就跃然而出。 二、“别时容易见时难” 别离是容易，再相见可就太难了。该句本是李煜这亡国之君对故土之不尽之思，去国离乡阶下囚，即使再怀念，也不可能回到故乡了。 此句形式和人生里许多事其实如出一辙。就如开头，晏殊那句“当事轻别意中人，山长水远知何处”。我的意中人啊，当时不懂得珍惜，轻易地与你分别，现在想寻你，山长水远，你又在何处呢？所谓一时轻别，锻造长久思念。 在这个时代，我们更多遇到的是，“再也回不去了”。初遇很美好，但若像“别时容易”一样双方都不懂得珍惜和维护，“见时难”亦是定局。 三、“相见时难别亦难” 相见很难，别离更难。李商隐的原诗解读角度不一，但从字面上可作为一种形式区分。 我知道以后我们相见会很难，所以在离别的时候就格外难过。跟第二种之区别就是，当时就已经知道需要好好珍惜，但现实的阻碍使我们不能在一起，从而不得不分离。这种定是对某一人或一事，相见的难是客观的难，离别的难是心里的难、情感的难。所以王实甫一句“愿天下有情人终成眷属”，激起多少共鸣和相思泪啊。 四、“人间别久不成悲” 离别的太久了，心中竟无法因此而悲伤。才认识到，“不成悲”比之“悲”，更加地悲凉。 所以这句诗写得相当凝练，用仅仅七个字就完美展现了什么是“比悲伤更悲伤的情绪”。 作者姜夔，我未读过这首诗，是从高老师那边听来的。全诗如下： 肥水东流无尽期。当初不合种相思。梦中未比丹青见，暗里忽惊山鸟啼。 春未绿，鬓先丝。人间别久不成悲。谁教岁岁红莲夜，两处沉吟各自知。 “当初不合种相思”，长期被相思缠绕而重会不得的凄然心境由字面反语表现地淋漓尽致。颇有李白“长相思兮长相忆，短相思兮无穷极。早知如此绊人心，何如当初莫相识”的惘然。 所以，“人间别久不成悲”是真的不悲吗？不是的，正因为相思牵绊太深，分别久后就会努力地不去想，保护自己，慢慢地在心底挖开一个洞穴，将思念埋进去。而生活中有太多偶然，某天，回忆涌上心头、思念冲破心田的那一刻，悲伤是无法言喻的，甚至无法承受。 “十年生死两茫茫，不思量，自难忘”。 现代交通和通讯的飞速发展，使得别离似乎不是那么难以接受了。仔细想想，技术的发展给了我们一种预期，一种重逢联络门槛不高的预期。然而，念生念灭，生活无常，预期很多时候真的也只是预期，聚散离合古今同，形式自然也是同的。 年轻时候，我们总以为时间很多，把相伴当成一件寻常事儿，被生活推着走，散了就散了，反正还有下一位。殊不知，人生很短，短到容不下几次离合。所以，不要等到“多情却似总无情”的时刻，心头万句无由诉；更不要等到少年事老来悲，只能默看游人缓缓归。觉察自己与世界的联系，真诚把握所拥有的，其后，离合自坦然。 夜深唯有霓灯虹，且歌且杯且从容，晚安。 ","link":"https://yfnwu.com/post/rjlbs/"},{"title":"VScode 推送 Github/Gitee","content":"基础教程不重复造了，现成的很详细 👉 Git教程 简要记录 终端输入 git --version ，显示版本号即表示Git安装成功。 假如使用全局用户名和邮箱（注册Github或Gitee时用的）。终端输入 git config --global user.name myname git config --global user.email myname@mymail.com 本地 Git 仓库和 GitHub 仓库之间的传输是通过SSH加密的。所以需要配置SSH秘钥，继续输入ssh-keygen -t rsa -C myname@mymail.com 后面的 myname@mymail.com 改为你在 Github 上注册的邮箱。之后会要求确认路径和输入密码，默认一路回车。成功的话会在 ~/ 下生成 .ssh 文件夹，进去，打开 id_rsa.pub，复制里面的 key。（ps: Mac下找不到.ssh，直接在终端里输入open ~/.ssh就行，会自动在桌面打开） GitHub——Account——Settings，选择SSH and GPG keys，然后点击 New SSH key 按钮，title 设置标题，可以随便填，然后粘贴 id_rsa.pub 的 key。 验证：终端输入 ssh -T git@github.com 若出现以下代码 $ ssh -T git@github.com The authenticity of host 'github.com (52.74.223.119)' can't be established. RSA key fingerprint is SHA256:nThbg6kXUpJWGl7E1IGOCspRomTxdCARLviKw6E5SY8. Are you sure you want to continue connecting (yes/no/[fingerprint])? yes # 输入 yes Warning: Permanently added 'github.com,52.74.223.119' (RSA) to the list of known hosts. Hi tianqixin! You've successfully authenticated, but GitHub does not provide shell access. # 成功信息 这就说明连上了Github。 ps: Git使用出现 git@github.com: Permission denied (publickey). 👉 处理方法 VScode 的使用 如何 Clone 代码以及远程推送本地修改 打开 VScode； 直接按快捷键ctrl+shift+P，然后输入git，选择克隆clone，去 Github/Gitee 复制仓库的 https地址 粘贴确定即可； 选位置（英文），选择打开克隆仓库； 本地修改代码后，左边竖起第三栏会出现蓝色的小点，点击进入Git管理界面； 可以看到修改的文件后面有字母M，表示文件modified。点击文件，可以看到增删内容； 点击图标M左边的+号，意为把更改暂存，但是此时并未提交； 提示让在箭头处填写信息，就是提交的备注，方便版本控制。然后点击箭头处 对号 提交；（这里只是提交到本地仓库） 本地推送到远程仓库，点击蓝色标志即可；（注意授权） 远程仓库刷新查看修改； 仓库如果没有变化，在 VSCode 中打开控制台（ctrl+`）选择“输出”，看是否有相关的错误提示，根据错误提示信息进行调整。 待完善 ","link":"https://yfnwu.com/post/VScode/"},{"title":"浮生一记·三","content":"昨晚朋友走时，已十二时。端坐下，我又陷入知乎的海洋，困到不行才勉强休息。So Friday night is gone. 早上起来八点多，想到周末时间是自己的，就再睡不着了。做了一连串奇异的梦，录下来，怕忘记。回家、等车、家人、陵墓景点、隧道、堵车等，摘取生活的碎片，编成一部大片。 这样醒来，又刷了会儿知乎，到九点多。如若像往常一样，便是不加控制的随意颓废生活，周末晚再后悔的恶性循环。所幸，周中提醒算是有点效果。我要列今日计划，然后按其完成！ 说行动就拖一会儿行动。系统自带的日历还挺好用的。 于是，美好的一天从空腹运动开始啦。 然后洗澡，适合思考人生。 在我这儿，计划和变化是一个整体，两者动态关联，目的是真实反应我今儿干了些啥。 晚饭时间，我整了一袋螺蛳粉，这玩意儿包装拆开怕是得有个把月了，周中跟朋友聊天，才忽然记起来，否则它可能会让我知道，什么叫“柜中无岁月”。 酸笋撕开的那一刹那，我第一次闻到了传说中的“味道”，轻嗅几下，还行，不至于不能下咽吧。 按说明书来，煮米粉、煮调料、加米粉再煮，一份螺蛳粉便诞生了。味道还行，在急剧降温的一天，吃得我满头冒汗。 （就是吃完，立马去了厕所，但它不能背锅，毕竟这也太快了，或者是早上千辛万苦挑出来的生菜？） 下午看《涅朵奇卡》，还是很佩服 陀夫妥耶夫斯基 对人物心理活动的描写，很值得一学。 今天，我发誓我要写点东西。不看知乎不会失联，不会死的！ ","link":"https://yfnwu.com/post/fsyj3/"},{"title":"For Rachel","content":"风暴前夕的结局有多快乐，风暴来临的心情就有多悲伤。 抱歉，现在的我只是空有剧烈的情感，遗忘了未来的一些事情。瑞秋and克洛伊，多么想人生就这么长久下去啊，你们坐着一辆自己鼓捣修好的破车，沿着那无尽的海岸线向远方飞驰。 Let me kiss you. “亲到这里就够了，我还要留着贿赂你呢” 哦，瑞秋。 哦，克洛伊。 现在的我不敢回想，那些模糊的未来。 你们的生活、梦想、友情、爱情……忽然之间就没有了，就那么短暂的瞬间，经历了多少事，花了多少时间才走到一起的啊。为什么，为什么！ 你们的人生应该还有那么长啊，还有那么多的事物去感受 起初，我只想是体验一个新奇的故事，满足下自己庸常生活的幻想。 后来，我认识了你们。 我知道，有一种真实，是从生活的普遍性里发现的；还有一种残酷，是从生活的特殊性里总结的。 经过漫长的几个周末，我看着你们逐渐成为对方的光，是伴也是侣。 接下来的三年，祝你们幸福地度过。 尽管非常非常的不愿意这个既定的结局，我仍然想再次见到你们。 准备好后，我们再会。 ","link":"https://yfnwu.com/post/ForRachel/"},{"title":"浮生一记·二","content":"我走在桥上，像是走在天上。 清晨，天光从云海之上倾泻。远方黛青色的山峦云雾缭绕，每天我都会朝它们迈许多步，尽管从未到达。 今日的清晨与以往稍稍不同，不是那种六点多行走的不同。 是送学生的家长少了。 我看着稀疏的校门口，只有三三两两的学生，急赶慢赶地朝里奔跑。 嗯，是暑假的味道。是已经扫进记忆里的气息。 寒假时也有这种感觉，但远不如今早那么强烈。 从此到九月，我每天步行去公司的街道，便再无小学生的语笑喧阗，再无家长们的扶手相送，再无这样熙攘的清晨。 （他们的笑脸，总让我想起小时候。时光是一列永不停息的火车，呼啸而去，绝不回头） 工作未满一年，生活跟当初料想的不太一样。但都是最好的。 傍晚回家。 河岸边有两排亭子，亭下木栏旁有两人聊天。柱间的木帮上，左边躺着一位仁兄，右边坐着一位。引起我注意的是那位坐着的。 他座下拴着一条很可爱的狗，淡金色毛发，坐立着四处观望，我瞧着它时，它也盯着我。座后是一堆废品似的杂物，瓶罐堆积，还有硬纸板，可能主人是拾荒为生吧。他头前倾，一直低着，腿并而立起，膝盖上搁着他双手捧住的一本书。目不转睛。 我不知道他在看什么，也不需要知道，因为我脑海里已奔涌出几十种人生故事，主角是他。那些脏兮兮的纸板和他手上那本米黄色的书页在我心深处已激起千种浪花。 此时，天色向晚，夕阳即将余晖，层层高楼掩映，城市里的黄昏来得更早一些。他还能看多久呢？我不禁担心。但须知，看一页是一页，一页有一页的欢喜，一页有一页的精彩，与其担心他能看多少，不如为他正在看，这个行为本身，喝彩。 做事，以驶向美好为出发点，并非一定要得到什么。 晚上的事让我知道，想太多永是自己在排戏，而且是没有对手的独角戏，往往脱离事实本来的面目。心态调整： 课题须分离，做真实的自己，爱恨发于心，且行。 ","link":"https://yfnwu.com/post/fsyj2/"},{"title":"向旧日之梦告别，我们以后记忆里见","content":" 有一个夜晚我烧毁了所有的记忆， 从此我的梦就透明了； 有一个早晨我扔掉了所有的昨天， 从此我的脚步就轻盈了。 ——泰戈尔《飞鸟集·烧毁记忆》 2021年06月09日20:41:28 记录这个时间，其实并无意义。 它就如一个循例的开端，之后的跟随才是表达的开始。 怀念过去，是为了时光还是年少的自己？抑或只是那些飞翔在缤纷漫天晚霞中的碎片画面？ 寻找意义，寻找到最后必然会包含或多或少的自我合理化。所以，无谓目的与意义，我们要问自己的是：你找到了什么？你看到了什么？你感受到了什么？ 你喜欢它们吗？ 我之所以为我，现在我觉得其实也没那么重要了。现在的我只存在于现在，以前的我尽管是永恒地存在于时间之河，但它与现在的我其实毫无瓜葛，它永恒，它也不会影响到现在的我。我只是稍稍了解它，而且是经过大脑加工过的那种了解。 未来的我存在于我还未到达的地方，我不知道他以何种形式存在，但我知道终有一天我会走到那里。每一次的选择就像是在分叉路口，每一条路通向了我的不同未来。以理性我能知道这个选择能够影响的一部分，从而做出选择。但命运的奇妙之处，在于那些你不能用理性预测的部分。你因为这个选择，去了不同的地方，遇见了不同的人，做了不同的事，喝了不同的酒，看了不同的海，抓起不同沙……其实也没有那么不同。 与过去好好告别，在什么时候呢？ 对于我来说，就是现在。 我即将踏上一段的新旅程，这个旅程我不是孤独一人。以前年少伸出去的那只手，残留的痕迹该抹去了，它会遇上一位新朋友。 这些风一样的过去，记得，但不再怀念了。 一辈子，白驹过隙，如果用许多的时间咀嚼那酸涩的过去，那该有多浪费啊。 脚下的路，每迈向未来一步，同时也在创造一步过去的回忆。 人生苦短，何必念念不忘。 ","link":"https://yfnwu.com/post/gbjr/"},{"title":"发之梦","content":"人只要足够困，他就能以任何姿态睡着。 星期六，整一天，朦朦胧胧。我睡着大概有三、四次。但什么时候睡去、什么时候醒来，却全然不清。早上就起得晚，我真有那么瞌睡吗？我很怀疑。 早上有过太阳，是的，我记得。就像很久之前的一个午后，阳光从天窗木框里直射而下，灼热、强烈。惧到逃离，转身、关门。火龙，卧室是你的了。 我周围不再是黑夜和梦境，明晃晃、亮堂堂的，有某种带指示意味的象征。促使我抓住一只长杆似的物品，挥舞着手臂，来回摆弄。这些房间是什么时候变得如此肮脏的呢？第一眼望去，除了干净你似乎看不到别的。可若蹲下细细感受，一种特殊气息弥漫在这里。 离开我的时候，毫不犹豫，也不作告别，散乱在我逗留过的地方。仿佛一种痕迹的尾巴，极其轻微，难以察觉。 我再次舞起拖把柄，想把它们都赶出去。 追逐一些东西，必然会失去另一些东西。这个明晃晃的热天午后，我感觉它们变大了，我却越来越小。这本来是件好事，因为如此意味着它们更容易被发现和清理。但是，生活总有但是，我，找不到自己了。 这件事情是这样的，我在打扫的间隙，忽然鬼使神差地跑到卫生间，想目击它们的源头。 像许多个日夜发生的那样，我的眼前是一面光滑的镜子。里面，照出了半个卫生间：白色的瓷砖墙、金属光泽的喷淋头、椭圆的马桶盖等等，但空无一人。我到哪里去了呢？ 我低头看手心，巴掌上躺着一根无比粗壮的头发，它总不能是无缘无故的吧。 它开始变得越来越沉，很快我的力气已不足以支撑。在我还没有找到它的源头时，它就落下了。我这辈子遇到过许多的谜，还没有哪一个，像这样地难猜。当然，我可以说，也许这根本就不存在谜底。因为我不能知晓所有事物的来源，就像我出生的时候没有记忆，而有记忆起，我就一直是在出生后了。 道理是这样，但悲伤依旧。我蹲下来，双手环抱自己，能触摸到一些软软的物质，此现象说明我的身体存在，结果我又高兴起来。我想到，这可能不是我存不存在的问题，而是镜子它本身的问题。或许，它在捉弄我，我能理解，毕竟整天呆在一个地方，不捉弄捉弄来访者，那这样的存在未免太无趣了些。又或许，它已不再是一面镜子，它厌倦了以前的生活，把自己活成了一幅画，以不变应外面千万种变化，这我也是能理解的。 客厅折过来的光线变暗了，是傍晚还是快下雨，都有可能。 ","link":"https://yfnwu.com/post/fzm/"},{"title":"雨奔","content":"云来所谓何事 从行政楼走出，铅黑色的云层叠一起，遮住了大半天空。天气预报说五点有雨，应该一会儿就到。晚饭时间很快就过去，出食堂门，感觉有小雨点从上空飘下，我懒得回去拿伞，急匆匆跑向大门，赶紧回家！ 可以说，当时的我，对于雨的到来是满不在乎的，最好是能在我赶到家之后再下，当然，半路下雨我也没什么办法，就淋一淋嘛，也不是没经历过，但这样的经历随着年龄增长和不再独身的关系，变得愈来愈不太可能了。当时我起码有三个选项，譬如回去拿伞、譬如骑电车（准来得及），但我像是怀着侥幸夹杂着深处的期待，径直跑向了外面的世界。 果不其然，小学门口的停车亭，我被迫在开始雨最猛的那段时间，停下奔跑的步伐。与判断有误，本以为那一片云过去就是一段无雨的间隙，翻出手机，一直到半夜12点降雨概率都是100%。看街上人来车往，形式各异的伞像是在提醒我这个孤家寡人，等是没有意义的！ 雨稍小，我将胳臂上挂的外套穿上，扣子都扣上，瞄了一眼灰青色的天，再次奔跑起来。 顶楼阳台，呼吸正被洗刷的空气，我闻到远方的山的气息。 雨天，我们之间的距离反是更近了。 ","link":"https://yfnwu.com/post/yb/"},{"title":"青春与梦想","content":"一场生日宴，遇见了梦想的模样。 以前只是听闻、读到、抑或观演，何曾想，能亲身感受到那种冲锋的炽热。 说实在的，很是受之鼓舞，回想青春的激情，那时觉着自己什么都能够做，拥有无限可能。 其实现在也一样啊，只是，行动的热情，可能不复当初。 就像奔跑，若是无明晰方向或目的地，跑着跑着就迷茫了。 所以说，热爱，是一件极难得的事。在多数人的生活中，一部分是物质条件欠缺，谈不到这个层次，一部分是欲望太多，反而削弱了最初的理想。毕竟总要先满足底层的需求，才会向上求。 回到自身，特别特别热爱的，在我的前半生还没有出现。仍在尝试、仍在路上。 尽管有怀疑，这是否是属于少数人的恩赐，我是否有遇见or把握的幸运，但追逐的精神是永恒的。人生本无意义，人只有自我编织，才把握自己的存在。 没有条件，创造条件。 遇到困难，解决困难。 生活的主题并非对抗无聊，而是寻找美好。找不找得到都是意义所在。 做吧。 享受过程。 而所有生命的结果，早已注定。 ","link":"https://yfnwu.com/post/qcymx/"},{"title":"剪辑笔记","content":"From VLOG博主 Jan B-Roll 辅助镜头 分类1 突然插入的动作：使叙述不那么枯燥，有快有慢 第一步：将一段动作简化为3~5个动作点（声音和动势 最强的地方——即重点） 第二步：可以连贯拍，也可特写 第三步：将动作和声音最大的一瞬间剪辑到一起 注意：不要超过10s为宜 视频节奏感：总分总；慢快慢；快慢快 一个节奏容易视觉疲劳 拍摄前期的脚本，在拍的时候有一个剪辑的画面在脑海里 BGM非常重要（&gt;70%） B-Roll 动作镜头 转场： 相同运动轨迹（镜头、动作、镜头+动作）转场 相近物体转场 硬切（符合逻辑） 跳切（减少画面拖沓） 遮罩（无缝转场的一种）没有遮罩时，可以制造遮罩 音效： 不论是转场还是动作 重要性占20% 爱给网 技巧： 遮罩转场：没有遮罩可以创造遮罩 反向构图：先拍落幅，再回到起幅（不论是抖动还是对焦等，都可以采用） VLOG拍摄流程 建议1 前期：选题——脚本——音乐 拍摄： 拍摄前想好要拍哪些画面是最好的（剪辑思路清晰），而非盲目地拍了一堆素材之后花大量的时间来整理和剪辑，当然旧素材二次创作，再讲一个故事也是可以的 不要舍不得拍摄的素材，让观众从多个视角体会你的感受吗，更多的画面提供更多的信息 （架好相机，再来一遍） 景别： 剪辑： 视频前三秒放你觉得很有意思的部分（或一段空镜） / 直接点题 然后开始叙事 冲突/意外/节目效果（或设计好的/拼接——前期OR后期） 如何解决冲突 结尾升华 目的： 讲一个故事（选题——线索） 从将要拍的故事里找一个点——放大 围绕你这个点去拍一些与之相关的镜头 设备 需求： 翻转屏 快速对焦 机身防抖 ","link":"https://yfnwu.com/post/jjbj/"},{"title":"补记·疫·初见","content":"纸质日记最后一天定格在5月23日，比我想象得久一些。最长的一段要属刚回来的某天深夜。这一段经历已是给我的身体和思想敲响警钟，思想上知晓了，行动却依旧。需再记一次。 ps: 等我搬完家，找一周末，将元旦的那段体验剪出来，拍得不甚全，但意义重大。 2020年2月2日 初九 晴转多云 凌晨十二点多，在一阵燥热中醒来，伴随惊慌的梦境残影，我发现我全身成了热源。有过十一月末经验的我，忙起床用纸巾沾些冷水敷上额头，联想到最近的疫情，我的心似坠入极寒深渊。粗算返家时间，堪堪十三天，有可能性，查肺炎症状，除了发热，其他均对不上，心下稍安。测心率，125，显然过快了。现在快凌晨两点了，怎么办，一个多小时，反复浸敷，仍不见效，只有服药才可。我必须联系家人，心中反复权衡，又不想因自己生活习惯的失律而导致麻烦家人，心说，二十分钟倒计时，若仍不退烧，就立刻打电话。 黑暗中，我盯着虚空，不住向各路叫得出或叫不出的神仙祈祷。再联想起肺炎可能导致的死亡，心内忧惧更甚，整个人都颤起来了。我不想，也不能死这么早啊，从个人，我还有那么多的生活还未经验，那么多未知还未探索；从家人，我父母只我一孩子，他们晚年不应该是没有我参与的，我的亲人们，与你们相处多一些，我就更爱你们一些，更加珍惜相处的时光，觉着当时每一刻我都是世界上最幸福的人，可我不想被定格那已逝的片刻，我想陪你们一直走下去啊。 我反省，我自责，我要正视因不良生活习惯给身体带来的消极影响。我祈祷，若我能安然度过此夜，我将尽我之意志，变我之习性，首先从早睡早起做起，其次在OneNote中列出生活良习List，择其善者而从之。 时间来到两点三十，身上仍无缓解迹象，我咬咬牙，伸手拨通了爷爷的电话，爷爷那儿有药。喝热水，服下两片阿莫西林，再喝下一碗爷爷刚煮沸的生姜茶，出一身汗。迷迷糊糊，大脑空虚神游，五六时方入睡。 七时多醒，身上余热未消，奶奶早已起身为我煮好一碗生姜红糖茶，我蜷起身子，架高背枕，一小勺一小勺啜着，感受到体内温热涌起，心中忧惧才渐渐散去。 又眯眼补神，九时母亲来，九时半父亲来，测了体温，三七度多一点，烧已褪去，余心终安。 起床洗漱，温一碗粯子粥，没有再比这更香的了，夹一只咸菜馒头，没有再比这更美味的了，剥一只浅褐鸡蛋，更没有比家中圈养鸡之蛋更新鲜的了。 饱食一顿，我开起来人生中新的一天。 感恩、感谢、感激。 上午打卡学习，过午继续，后补昨晚之眠。二叔他们五点多回来，晚上吃春卷，相当美味，我吃了怕是得有四只。他们明日一早还得走，我打着灯，一同去田间摘菜，主要是葱和青菜。 生活一切如常，就是最高的幸福。 晚安。 10:24 PM ","link":"https://yfnwu.com/post/bjyqcj/"},{"title":"杭州行记","content":"毫未知觉，杭州之行已远在两周之前。 四五月份忙于毕业杂事以来，日记益少，自我对话常常只在心里进行，博客亦是许久未更。国庆出游，脱出生活的惯性，且记。 八月之约 “XX，国庆有计划有没咯？” “还没想好啊，现在可忙嘞。” “忙啥子？你还在学校？” “可不是，后天答辩，PPT还没弄完呢……” “加油加油，没事儿的，放心！” “嗯嗯，没曾想，竟然弄到八月末才安排答辩，毕业旅游是木有了。” “国庆一起啊，我这边还有朋友，你没计划的话，一起转转呗~” “嗯，暂时还没想，应该没啥事儿。” “那就这样定了！” “好的，先不说了，我赶紧弄PPT去了。” …… 新历七十一年的傍晚。 南方某座小城的站台，列车滑行渐止，随着车门的开启，好友踏步从昏暗的车厢走进夕阳。 “你还是老样子啊” “呵，小伙子又变帅了” 几年的光阴似乎被瞬间跨越。 没有去订好的座位，我们一道立于车厢连接处，聊聊各自近况。 原本目标地是上海，由于疫情以及车票等原因，后改为杭州，倒是离我近了许多。好友坐高铁而来，与我同向，正好一辆车。 载着一厢语笑喧阗，火车在金黄的原野上奔向太阳。 我自认感性，是那种迟钝的感性，当时不觉，事后想来，千思百感。 一行出游三人，除了我好友，还有其大学社团的朋友小甲，当初也曾相伴而游，并不算太陌生。她是第二天的车，我们先到杭州。 为方便，酒店靠近东站，我们拖着行李，安置好后忙不迭出门觅食。 今年公历十月一对应农历八月十五，双节同天，可以预见的热闹。 餐厅客极多，我们从座无虚席吃到几近走空，诉遍各自生活与畅想，一如当年。 DAY 1 一觉睡到八点出头，赶九点东站接小甲。她来之前就博览网上游记，画了一幅杭游攻略，时间排的细，我们安置好行李就往地铁口去。 南宋御街，逛逛吃吃，稍累在街上找了家电影院看刚上映的《姜子牙》，下午直奔西湖。湖边人比预想的多得多，本以为疫情之因，会少些。堵个不停的公路、挤满人头的断桥还是给我的想当然上了一课。但也无所谓啦，压一压湖中小道，留几张游客照，重要的是身边好友一同在，身前美景不胜收。 计划是美好的，断桥残雪-白堤-平湖秋月-曲院风荷-苏堤-花港观鱼，最后到雷峰塔观日落。却是高估了步速，苏堤还未行一半，晚霞即已散满天。 湖水荡漾晚风中，一片深蓝。苍穹暗淡，吹来远方的风，秋意在胸口升腾。一轮圆月忽跳出，斑驳的米黄带点暗红，侧下的雷峰塔发出淡淡的金光，相映成辉。 朋友俩在一旁寻晚上饱腹之所，多少年的中秋之夜没好好赏月的我，贪婪地凝望着异乡的月。不知是愈长大时间愈发快的原因，我竟能明显感觉到月亮挪动的痕迹，其徐徐上升，颜色渐变，这就是说，它又显示出白玉盘、瑶台镜的风采来了。 晚餐目标南山路，雷锋塔另一边。湖对岸的高楼霓虹闪烁，出园门的街游人如织，坐上公交车竟还有空座，很是幸运，当然，堵车也是意料之中。 小甲约来其在杭州读书的表妹小乙，小乙白天上课，晚上才有时间出来。姐妹俩几年未会面，相见甚欢。 杭帮菜。叫化童子鸡、西湖醋鱼、东坡肉……肉食大都还记得。口味方面轻咸一点甜，挺合我胃口。 一年明月今宵多，有酒不饮奈明何？ 我仍记得，那天回去时，头顶柔和明净的夜，窗外安静下来的城，和车里一路火热的乐。 DAY 2 小乙第二天一大早即匆匆赶回，课是不好意思翘的。我们休息到九点，小甲有些自责，昨晚两人回来后又叙一通，睡太晚了，小乙今儿白天怕是不太好过。 龙井村-十里锒铛-九溪十八涧-九溪烟树，这便是接下来的计划。先预备乘车到山上，一路下行，可省些脚力。 我看过地图，杭州城的地形还是很好玩的，中横一道江，西南湖边山。 倚坐在公交上，车沿着蜿蜒的柏油路盘山走，耳机中的音乐忽然同窗外古林格外地契合。曲子开头鸟鸣山间，连续的鼓点每一拍都好似对应一棵树，要将一段段往事演绎出来。几万年前的一片汪洋，如今漫山的郁郁葱葱。在这个平凡无奇而又极其巧合的某天午后，这些树木与我浮光掠影般打了个照面，此时此刻，我感觉像同时活在了过去和现在的时光里，我们从未见过，构成我们身体的元素也许更是来自于相距无限遥远的超新星爆发，但就在这个瞬间，我感到一种难以言说的联系感，虚无缥缈却真实存在。存在不需要计划，它在时间长河中流淌，遇见是偶然也是必然，存在无需修饰、无需坐标系，存在只是这个世界里这样一幅树与人的画面骤然出现又骤然消失，仅此而已。 山上人家不少，路两边卖茶的也甚多。我们一路走，一路赏，一路聊，一路拍。群树掩映的山道，起起伏伏，风穿林叶，回旋荡漾，好似在欢迎远方的旅人，虽然下个瞬间就是永别，但这一秒，我听见了。 我记得那天午后，山峦上空的风驱散了云，阳光洒下来，尽管只有零碎的光芒能穿越叶隙，密林深处原本氤氲着的薄雾仍慢慢散开，我啃一口手上的面包，默念：这多好啊。 四时，钱塘江岸观潮起，五时，白塔公园车鸣笛，六时，餐厅门外等排位。 游戏之夜。 实话讲，我上一次玩面对面桌游是好些年前的事了。科技方便了人与人间的联系，却可能在一定程度上阻碍更深入的交流。而成长像是一种循环，它不意味着一定要不停地放下。 小乙诉说着白天的疲倦，我想不到什么可以安慰的话语，毕竟这是左右兼具不得的事儿，那句陈词滥调怎么说来着的，哦，这，就是生活。愈长大愈感亲情之可贵啊。 生活里，我们的角色常常身不由己，游戏则给了我们向外展示的新可能，即使是暂时的，即使玩的不那么好，新的体验总能让我们愉悦，足够了。 我仍记得，那天游戏结束后，楼外小雨正淅沥，湿润寒气从脚下升起，胸间却有一股暖热流向四肢百骸，混杂着兴奋与悲伤。回来后，我和好友聊至后半夜，回忆从前的自己、回忆初见的人们、回忆再回不去的时光。 分别 计划里，最后一天上午逛灵隐寺及法喜寺。然而人多到需要提前预约时间，我又是赶中午的车，昨晚迟睡，起后计算了下时间，赶去赶回加午饭，实不足够，便不一道去了。 早餐毕，拥抱，再见。 见面到分别，时间快到不可思议。站在客房的落地窗前，我在想，下次会面又不知是何年月。 楼前有几个孩子在追逐嬉闹，路过的旅者们拖着行李箱匆匆赶路，我望向刚从小雨转阴的天空，好似瞧见一轮火热的太阳。也许，时间从未变，只是我们这一生，都在奔跑。 ","link":"https://yfnwu.com/post/hzxj/"},{"title":"故乡与鸽","content":"热天午后，醒后朦胧，好像听见了上课铃响起。 揉了揉眼睛，你看。高空悬炎日，南风卷麦浪，天地随之于浪尖扭曲，沙沙声不断穿过耳膜。时光仿佛依旧历，确是十年弹指一挥间。 五月故乡，久违了。 晒场上，斗笠下，奶奶擎着一把连枷，挥上舞下。起落中跳脱出一种节奏，菜杆炸裂，油菜籽四散崩跳，从一根根细长管越入到广阔的新世界。尽情享受当下的火热吧，新世界里不仅有光明和大地，还有一种机器叫榨油机。 奶奶跟我讲，她刚刚在田间捉到一只鸽子，当时它扑棱着翅膀在丛丛麦秆中挣扎，一小节翅膀被缠住，逃不脱，飞不走。那一刻，它遇见了我奶奶，那一刻，它一生的命运就转交他人。奶奶见它时，些许心急，扯坏小节翅膀，它可能再飞不好了。一只铁笼，一碗清水，一盘谷粒，我与它初次见面的情形就是这样的。我凑近瞧它，它斜着眼睛看我，白灰交错的身体在轻轻颤抖，束缚的自由表征出未来的恐惧。鸽兄，你听我一句，活泼些、激昂些，做个解闷的玩意儿，能活久些。 夏夜至，凉风来，鸽兄，你睡了吗？这样平静的夜晚，也许你我都期望可以久一些。 ","link":"https://yfnwu.com/post/hxos/"},{"title":"如何寻找一本书","content":"简单的定向搜索方法，配合 Google 食用更佳。 Methods No.1 格式限定 👇 No.2 格式严格限定 👇 No.3 站点限定 👇 No.4 书名严格限定 👇 No.5 内容严格限定 使用加号（+）: 在关键词的前面使用加号，也就等于告诉搜索引擎该单词必须出现在搜索结果中的网页上，例如，在搜索引擎中输入“+机器人+星际+战争”就表示要查找的内容必须要同时包含“机器人、星际、战争”这三个关键词。 使用减号（-）: 在关键词的前面使用减号，也就意味着在查询结果中不能出现该关键词，例如，在搜索引擎中输入“科幻-神们自己”，它就表示最后的查询结果中一定不包含“神们自己”。 书站推荐 ePUBee电子书库：http://cn.epubee.com/books/ 鸠摩搜索：https://www.jiumodiary.com/ 书伴：https://bookfere.com/ 偶书：https://obook.cc/forum-1.htm 电驴资源：https://cse.google.com/cse/home?cx=006422944775554126616:gbrsbrjbfug 古登堡计划：http://www.gutenberg.org/ 古登堡计划（Project Gutenberg）是一个拥有60,000多种免费电子书的图书馆。在免费的epub和Kindle电子书中选择，下载或在线阅读。您将在这里找到世界上最伟大的文学作品，重点关注已过期美国版权的旧作品。成千上万的志愿者将这些电子书进行了数字化处理，并进行了校对，以进行娱乐和教育。 ","link":"https://yfnwu.com/post/Kindle01/"},{"title":"推理谬误","content":"批判性阅读和聆听的主要目标就在于判定结论的可接受程度或者价值大小。 所谓谬误，就是推理中的欺骗手段，作者有可能利用这个欺骗手段来说服你采纳其结论。 （1）提供的推理需要明显错误的或者让人不能接受的假设才能成立，因此使推理和结论显得毫无关系； （2）把那些明明和结论无关的信息弄得好像和结论有关，以此来分散我们的注意力； （3）看似为结论找证据，而证据算数的前提则取决于结论本身已经成立。 常见谬误 人身攻击谬误（ad hominem fallacy） 针对个人的人身攻击或侮辱，而不是直接反驳其提供的理由。 有可能假设是明显错误的 假设越可疑，推理和结论的相关程度也就越小。 滑坡谬误（slippery slope fallacy） 假设采取提议的行动会引发一系列不可控的不利事件，而事实上却有现成的程序来防止这类连锁事件的发生。 追求完美解决方案谬误（searching for perfect solutions fallacy） 假设因为尝试某种解决方案后还有遗留问题未解决，那么这种解决方案根本就不应该采用。 如果坐等完美解决方案的出现，我们常常会发现自己固守原地、动弹不得。 推理理由谬误百出 偷换概念谬误（equivocation fallacy） 论证中关键词语有两种或者两种以上的含义，一旦不同含义之间的转换被认出来，这个论证就讲不通了。 诉诸公众谬误（appeal to popularity fallacy，Ad Populum） 通过引述大部分人都持有这一观点的说法来竭力证明某个论证有道理，错误地假设大部分人喜欢的一切就是有道理的、可以接受的。 诉诸可疑权威谬误（appeal to questionable authority fallacy） 引用某一权威的话来证明结论，但该权威对这一论题并没有特别的专门知识。 诉诸感情谬误（appeal to emotion） 使用带强烈感情色彩的语言来分散读者或者听众的注意力，让他们忽视相关的理由和证据。常被用来加以利用的感情有 害怕、希望、爱国主义、怜悯和同情。 当这类情绪反应本不应该和结论的真伪发生关联时，这个谬误就会发生。这类谬误特别常见的三个地方就是广告、政治论辩和法庭论辩。这种谬误的一种常见形式是恶语中伤（name-calling），属于一种人身攻击，主要通过引起人们不好的感情联想的言辞来给人戴帽子，试图诋毁别人。 稻草人谬误（straw-person fallacy） 歪曲对方的观点，使它容易受到攻击，这样我们攻击的观点事实上根本就不存在。 稻草人不是真人，而且很容易被击倒，如同一个人犯了稻草人谬误其立场很容易被攻击一样。要检查一个立场被表现得到底有多公平，最好的办法就是找出所有立场的事实。 虚假的两难选择谬误（either-or false dilemma fallacy） 当现实中存在两种以上的选择时，却假设只有两种解决方案。 当我们要为某一类行为寻求解释时常常会遇到越想越糊涂的情形。 当有人宣称他们发现了导致某个行为的原因，而实际上他们所做的不过是为这种行为起了个名字而已，我们要对这种**乱扣帽子谬误（explaining by naming fallacy）**保持警惕。 错误地假设因为你为特定事件或行为提供一个名称，你也就合情合理地解释了这个事件。 警惕分散注意力的干扰 那些尽力要让人接受其断言的人常发现，只要他们防止别人太过详细地审视他的相关理由，他们就可以捍卫这一断言。 持论者使用的那些推理论证主要是为了转移你的注意力，让你不再关注最相关的那些理由时，你就要特别警惕。 光环效应谬误（glittering generalities fallacy） 使用模糊、引发人们强烈情感认同的美德词汇，使我们倾向于同意某件事而不是去细致检查其理由。 美德词汇的使用是政客们经常玩弄的手腕，因为这个手法可以分散读者或听众的注意力，让他们不去关注具体的行动或政策，而这些行动和政策更容易招致反对和批评。 转移话题谬误（red herring fallacy） 一个不相干的话题被插进来，将注意力从原来的论题上转移走，通过将注意力转移到另一个论题上来帮助赢得一场论战。 谬误顺序：1 甲主题正被讨论；2 乙主题被介绍进来，好像和甲主题有关，实际上并不相干；3 甲主题被置之不理。 只要你脑子里谨记真正的论题所在，同时牢记解决这一论题所需要的证据，一般而言要找到转移话题谬误并不难。 这种类型的推理是错误的，因为仅仅改变讨论的主题，很难被当做反对某一断言的一个论证。 如果一个转移话题的谬误发生，问一下谈话者可不可以回到原来的那个论题。 愚弄人的循环论证 结论由同一个结论来证明（只是表述不同）。这样的论证其实是在回避问题，而不是在回答问题。 循环论证谬误（begging the question fauacy） 在推理过程中已然假设自己的结论成立的论证。 实践 一旦作者有下列行为之一，你就应该驳回其推理论证： 对人不对事 使用滑坡推理方式 表现出寻找完美解决方案的趋势 用模棱两可的话隐瞒真相 不恰当地诉诸公众意见 诉诸可疑权威 诉诸情感 攻击稻草人 呈现虚假的两难情形 通过恶语中伤来解释 将注意力从论题上转移开 通过光环效应来让读者分神 循环论证 介绍另一个话题来转移注意力 其他 一厢情愿谬误（wishful thinking fallacy） 混淆“是什么”和“该是什么” 以偏概全谬误（hasty generalization fallacy） 一个人仅根据群体中极小部分人的经历就得出有关整个群体的结论。 强求确定性谬误（impossible certainty fallacy） 认为一个研究结论如果不是百分百确定的话就应该被抛弃。 错误类比谬误（faulty analogy fallacy） 有人提出一个类比，其中却存在重要而又相关的不同点。 过度简化因果关系谬误（causal oversimplication fallacy） 依赖并不足以解释整个事件的具有因果关系的因素来解释一个事件，或者过分强调这些因素中的一个或多个因素的作用。 因果混淆谬误（confusion of cause and effect fallacy） 将事件的起因和结果相混淆或是认不出两件事之间可能是相互影响的关系。 忽略常见原因谬误（neglect of common cause fallacy） 认不出两件事之间之所以有联系是因为常见的第三种元素起作用。 事后归因谬误（全称为“post hoc, ergo propter hoc fallacy”） 假设某件事乙是由另一件事甲所造成的，仅仅因为乙在时间上紧随在甲之后。 整理自《学会提问》笔记 ","link":"https://yfnwu.com/post/reasoning01/"},{"title":"博客搭建及优化教程汇总","content":"博客搭建 👉 Gridea 简易上手教程 👉 官方网站 主题市场 博客优化 图床 上传工具：PicGo 优势：开源免费，基于 electron-vue 开发，支持 Windows、macOS 和 Linux。默认支持微博图床、七牛图床、腾讯云COS、又拍云、GitHub、SM.MS、阿里云OSS、Imgur。方便不同图床的上传需求。2.0版本开始更可以自己开发 ry.fancybox.min.js&gt;&lt;/script&gt; &lt;!-- 2. Create links --&gt; &lt;a data-fancybox=gallery href=big_1.jpg&gt; &lt;img src=small_1.jpg&gt; &lt;/a&gt; &lt;a data-fancybox=gallery href=big_2.jpg&gt; &lt;img src=small_2.jpg&gt; &lt;/a&gt; &lt;!-- 3. Have fun! --&gt; 浏览器标题恶搞 var OriginTitle = document.title; var titleTime; document.addEventListener('visibilitychange', function () { if (document.hidden) { $('[rel=icon]').attr('href', /img/trhx2.png); document.title = '呜~页面崩溃了！'; clearTimeout(titleTime); } else { $('[rel=icon]').attr('href', /img/trhx2.png); document.title = '噫~又好了！' + OriginTitle; titleTime = setTimeout(function () { document.title = OriginTitle; }, 2000); } }); ","link":"https://yfnwu.com/post/blogdiy/"},{"title":"写给新的一年","content":"二零一九年风也似地过去了，新世纪的头二十年成为昨日，真让人有点不敢相信。在新年来临之际，本该说点儿展望未来，制订计划之类的事儿，但最近我总处在一种混乱的、难以剥离的思想状态中。到一个安静的环境，想想过去的一年。 回望过去，人最先记起的多是遗憾的事，如果当时，如果当时…这种心态尤其在我玩游戏时体现出来，一次次读档，追求完美同步。可人生哪是能存档暂离的游戏，每一秒都在向前，过去的永恒地过去了，再不能回头。我想，转换关注点该是更好的回忆方式，信息的解读往往比信息本身更重要。多多关注积极向上的事物，心态变易，美好事情也会关注你。 于是我会想起，正月里家人围着一桌菜肴的热热闹闹，临走时田埂上破土而出的青葱小草，清明时淅淅沥沥的漫天烟雨；夏日里午后校园林间此起彼伏的声声蝉鸣，饭后擎一支雪糕划过炎日的自在放松，傍晚球场上浸透汗水的活力昂扬；秋虽短，每有木叶飘落，仰头凝望，以高远之空为底，如诗之画；正经冬，树虽眠而内蕴生机，外虽寒而内有暖气，大雪一纷飞，人间舞精灵，万物换颜，均若初见。身有五感而知觉，幸甚，幸甚！ “如果星星每千年闪烁一次，我们都会仰视赞美这个世界的美丽，但是因为他们每天都在闪烁，我们将之视为理所当然。” 今天在寝室嗅到舍友所带饭菜飘散出来的香味，忽记起我六七岁时，奶奶在老家火灶下洞口烤番薯的样子。灶上是个大铁锅，一般多是锅上炒菜时，奶奶顺手丢一两个番薯进洞，等几个菜炒好，番薯也就差不多熟了。出洞时薯表黑如炭，然剥开皮焦香四溢，那股混合了童年的食香，从不曾忘记，一闻见就能记起。 转眼之间，我离开家乡求学已经快七年了。现今不若古时，交通便捷，通讯方便，倒很少时候心里烦忧离别之愁。大学毕业，求学之地从西北换到华北。生活趋向更平淡，求一些精神上的解答，与友联系，与家人交谈，虽常有世界第一难题之烦恼，但总体顺遂，平静无波。有闲情，鼓捣一些感兴趣的东西；有余暇，读读宇宙与星辰的想象作品。深感幸福之至，珍惜拥有一切，甚至于从每次别离中剖出一种浪漫来体味。当然，人生在世，如琴弦下流淌出的音符，要平缓，也要激昂，时而波澜不惊，时而澎湃汹涌。今年即是变化的一年，最终的毕业即将来临，六月盛夏将是新的起点。愿自己拥感恩之心，体验世间百态，短则短矣，活得真切方好。 新年钟声余音未尽，我们又都长了一岁。对于过去这一年，对于已过这些年，总该有个结语：成长之路有阵痛也有欢愉，幸运的是，你仍可以在其中做出选择。 ","link":"https://yfnwu.com/post/2019/"},{"title":"刺激与拖延","content":"短程、持续的刺激是埋葬光阴的坟墓。 没有什么能永垂不朽，但可以拖到天长地久。 中午方起。周末有天然的氛围让我想放纵自己，大多也是这么做的。在以前忙碌的时候，我总在想，如果能给我舒适的休息时间，我要看什么什么书，写多少多少文章，锻炼这个那个技能，然而热情总只有三分钟，哦不，头都开不了。放假先稍微休息下吧，一般休息完就是开学了。所以，你告诉我时间都去哪里了？全丢在日复一日的舒适圈了，关键如果是心安理得还好说，你并不会有这些烦恼。可头顶万丈长虹，远眺浩瀚星空，常思考人生以外的东西，对现状生出平凡的焦虑，不甘而懒，才是最痛苦的。 拖延，不找借口，缘由就是延迟痛苦。也不一定是真的痛苦，很可能是想象出来，生成的虚拟痛苦。而且做抉择和决策也是要消耗意志力的，这样就很容易去选择那些容易走而不论方向的道路。 所以解决的方法是什么呢？ 首先光靠意志力是妄想，这玩意儿单位时间内总量有限，太费力的努力往往会折服于舒适。相较而言，变环境阻力小多了，由外而内，让周围带你的节奏。 其次是少给自己抉择，用习惯去代替意志。譬如，一铃响就起床，而不是躺着看手机；一下床就洗漱，而不是坐着玩平板；一洗漱完就出门去吃早餐，而不是这里蹭蹭，那里磨磨，却啥都没干；一开电脑就先把最难的任务定个时间完成，而不是先刷个知乎或新闻，放松大脑……形成一怎么就干嘛的习惯，不用决策，直接做，有时候不思考意义才是最高效的。（扯） 而我自身最主要的一个问题就是躁动，心性依然像个贪玩的孩子。好奇心是进步的动力，可不耐烦却是半途而废的预兆啊。心得沉下去，专注专注再专注。 最重要的，可别晚上想了千条路，早起依旧卖豆腐。变化才是生命最本质的特征。 过午近两点去七食堂，还开着门，三三两两，散着坐着。点了习惯的餐，走了习惯的路。实验欲速，论文欲速，可我想生活慢下来啊。 耳朵里塞着耳机听着歌，填着就业协议，签下人生转折书的那个瞬间，和其他瞬间并没有多不同感受。也许多年以后回过头来，会感叹几句，但现在，一个平凡的下午，要说跟平常有什么稍稍不一样的地方：晚饭后，加了一杯布丁，有点甜。 ","link":"https://yfnwu.com/post/cjyty/"},{"title":"二零一九 北京初雪","content":"出门时候，雪似刚起，和着风，洋洋洒洒。我把耳机挂上，衣领竖起，去取我的包裹。 天色渐暗，雪花不仔细瞧倒是不易见，但一辆汽车驶过，尾灯下便现出他们飘落的身影，一辆一辆，雪也仿若一层一层落。我歪着头，听着耳朵里传来 Life is strange 的主题曲，突然觉得，生活之美好，永远是当下一刻。 今天我是五点半才睡的，然而我闭眼预备入眠的时间是昨夜十一点多。不是失眠，更不是玩手机。我发烧了。 其实在努力入睡时，全身就好似变烫了。我也不是很清楚自己到底睡着了没有，就是各种胡思乱想的担心，变成画面和声音在脑袋里回荡，反反复复，整个人至于恍惚。折腾到两点，一摸额头，烫得很。挣扎着爬起身来，打一盆温水，用毛巾给自己降温。把毛巾卷成一团敷上额头，闭上眼睛期待能有些帮助。思维滞缓，如何熬过这漫漫长夜？发烧的症状昨天下午时就出现了，当时 Herr张 帮忙送我去校医院，量下来 39.5°C，医生直接让转院。 于是 Herr张 又不辞辛苦将我送至区医院，挂号检验开药，等待时间略长，但血常规出来仅是炎症。没什么大问题，总是好的。晚上也吃了药，哪知道这么快又开始了，烧在被窝里时，我的整个人生在脑海里回荡。 高烧持续不退，辗转反侧。舍友们发觉后，一齐爬出暖和的被窝，预备送我去医院。零下五度的北京在车窗外呼啸退去，我觉得也不是那么冷了。 头晕乎乎的。 医院深夜是急诊值班，我还从来没在这个时间点来过。大厅里长椅上或坐或躺着一些人，不知是病人还是家属，还都靠在一起。其中有一对中年夫妻，年纪估摸着得五十多了，丈夫头枕一个褐色的旧旅行包侧躺着，面对着椅背，不知睡着了没有，妻子正举着筷子，在饭盒里夹着什么，亦不知为何在这时才吃起饭来。 先挂号，然后去找医生就诊。半夜的门诊室依旧不停歇，排了好一会儿队。由于下午已经化验过血液，医生很快就给我开了药和输液单。药房在二楼，电梯里有位全身罩住躺着的人，刚开电梯门吓了我好一跳，毕竟又是半夜、又是医院。后来估摸着是医院的电梯管理员，可能太累了吧。 输液室内人满满当当，我找了个角落的躺椅，坐下来等待护士。 右手边半躺着一位学生模样的短发女生，她用手臂盖着半边脸，在跟两位我开始认为是她同学的女生聊天。聊着聊着，我左边似在瞌睡的女生也加进来了，该是认识的。 左手输进身体一小股凉意，脑袋也清醒些。闲着也不想看手机，便与她们攀谈起来。 她们四个是同事，都在 XDF 工作。短发女生今晚加班，身体出状况，晕倒了，她们几个关系不错，合力送来医院，好在没有什么大碍。我这段时间正找工作，便往这方面多谈了些。她们有三都是程序员，还挺巧，其中一位还是我的学姐，毕业于 BIT 计算机学院，工作六七年，一直呆北京。相比而言，短发女生工作经历可算丰富，本科学的电气，校招专业对口去了高铁，一年不到就辞了，直接放弃专业，进了京东的物流部门，没多久，还是觉着没意思，辞职转行当老师……才几年，换了三个行业，而且干得都不错（同事语），有些厉害。我问她准备在老师这个职业长呆吗，“不，我现在的梦想职业就是不工作……”，她的身体状态这几年一直不太好，上次公司运动会上被抓去长跑就险些晕倒，现在公司又上新项目，连续加班，终是绷不住了。 我们相互叹息着人生，吐槽着社会… 不知不觉我的输液将尽，医室里先前的人们已渐渐散去，据我观察，在这段时间，有两对情侣、一对中年夫妻、两学生、两老人，来过又走了。指针拨近五点，我也该离去，短发女生还没输完，她的同事们先行撤回公司打卡，再买了早点赶过来，正巧迎面遇上，“学姐，还有各位姐姐们，再见啦~” 再见，再见。 我向天空伸出手，掌心里落下丝丝凉意，一场盛大的初雪开始了。 ","link":"https://yfnwu.com/post/2019bjcx/"},{"title":"晨记","content":"晴 往前数一次早睡早起，不知什么日月。总算在极端放逐之后又勉强住了自己，故清晨一记，望保持。 时间流逝的捷径就是让精神暴露在易得、浅显的信息流冲击中，绵绵不绝且不知不觉。解决的关键在于，先有对 当前状态的主动感知，之后有魄力立即抽离陷入的物理环境。由外而内，可为有效之法。 起床泡一杯杯咖啡，临出门，瞥见一缕阳光从门下半窗洒入寝室，映到天花板上一小片柔黄。温度虽低，心却暖和起来。寝室楼前有一排柏树，走在树下，风摇枝丫声在头顶起伏。风不很大，群叶似蝴蝶乱舞，姿态各异，形迹万千。踏一脚叶身四碎，咯吱咯吱，一夜之间整条大道成了它们的天下。 刚读鲁迅先生一篇随笔，主论个人的自大与群体的自大，警醒起来。 有国家荣誉感、自豪感固然是好的，但可别自己无甚才能，拿国家来当幌子。吹嘘制度、国粹，一有别国人认可，便与有荣焉。遇事时若胜，一群人中有自己，仿佛自己脸上也有光了；若败，则败不止一人，推脱全责亦可。如此陋习，且自警惕。 多说一句，自我归类于群体时，先问问自己能贡献什么价值。荣誉感、自豪感，更应该在自己本身获得成就时涌现，而非因出生前就意外获得的身份而平添。 ","link":"https://yfnwu.com/post/cj/"},{"title":"明天周六！","content":"风起 在周五的晚上，很少见，我竟然在零点前上床了。五味杂陈。 一个个誓言仿若嘲笑嘴角的纹路，也只能报以苦笑。 今天也是开学来相当勤快的一天。早七点半多起，因担心导师早上会找，匆匆赶去实验室。（连续三天早饭，赞一个）实际并未有，到实验室快九点，准备一番，还是装几个电池吧。一顿忙碌。 中间接到两电话，一个是FC，一个是JX。纳闷了，他们难道约好到这个时间点？我满以为十一月中旬，各大公司秋招都尘埃落定了呢。下午FC电话面试，推到5点多，自我感觉还行，就是对他们薪资待遇不感冒。我到底想要什么？我又在问自己。 约了下午一点到三点的SEM，为了赶时间，十二点多到停车场边吃的快餐。 不去想事情本身的意义，只是去做，提前用简短的时间做决定。有时候还是挺有益处的。一个是思路清晰，不想杂七杂八的，做的效率也随之水涨船高；其二是，有些之前想过不太能接受/做到的事儿，竟稀里糊涂就过去了，人强大的适应性可见一斑。 傍晚，餐后取快递。路上，瞧见路两旁银杏树，在几天大风吹扫下，大多成光杆儿状，光秃秃的枝丫指向天际，脚下是黄灿灿的大地。可有勇士，不知是之前树叶本就很多，亦或是枝丫根上更有劲儿，亦或是不舍，好像几天的大风对他不算什么一样，依旧层次分明挂着各种高度的叶儿。我追究其原因，可我又很快抛却了这条思考的路，那又怎么样呢？勇士在这里，只是宣说，我，独一无二。 每天的琐碎，若不诉于笔端，必然被时间所抛弃。非是追念永恒，只是，木犹如此…… 晚安。 ","link":"https://yfnwu.com/post/mtzl/"},{"title":"回忆是一条没有归途的路","content":"晴 微风 寒 一顿早餐，精神涣散。时间流逝地让人麻木，刹不住的惯性让麻木成为一种常态。2020，曾一度让我觉得遥不可及的未来，相距也只剩下五十多天。哦，我的生日也快到了。 过去都是假的，回忆是一条没有归途的路，以往的春天都不复存在。 下午睡了很长的一觉，碎裂梦境贯穿始终。梦中见到一面镜子，一切都很清晰，除了自己的脸。那个世界没有线性的时间，也从不触发对自身存在的怀疑。在梦幻中回忆前梦，虚幻极致到真实。那一种真实如此强烈，以至于醒后还沉浸恍惚于不曾发生的过去。空中雨滴声渐起，什么时候能再续前梦？ 《神话》里有一位教授，一心为长生不老，全不在意身处之境，只望着梦寐以求的天宫拾级而上。白玉台阶，一级一级地接连在他身后坠落，走向长生不老，也走向死亡。不可阻挡，无法避免，永不回头。即使明知紧随脚后的那级台阶往下坠的绝对倾向，也只能在往前迈步的同时，想象它的缓缓下降。 所有旧时坍缩成一幅画，再无人能见。 我沉溺想象，闭上眼睛，退后既已不能，望前的目光也放弃了。 所谓现实，转瞬即逝。 哎。 ","link":"https://yfnwu.com/post/hysytmygtdl/"},{"title":"星球生成记","content":"2019-10-29 注册 GitHub 2019-11-02 星初 Version 1.0 2019-11-03 Theme:Pan(@山卜方). Powerd by Gridea 2019-11-05 环境优化 各类统计 排版微调 爱心 阅读时间 背景随机 2019-11-06 折腾评论系统 评论区头像改变备注（可选）： Valine 目前使用的是 @Gravatar 作为评论列表头像。 请自行登录或注册 @Gravatar ，然后修改自己的头像。 评论的时候，留下在的 @Gravatar 注册时所使用的邮箱即可。 2019-11-07 解决表情包问题；添加 Google Analytics 2019-11-08 申请 个人域名 https://yangfana.top （一年） 因用 Gridea 推送，故先将 Github pages 部署到 Netlify ，再绑定个人域名；添加 HTTPS （申请阿里云一年免费SSL证书）；在 Gridea 本地修改域名，保存推送。 OVER 2019-11-09 尝试用 baidu spider 抓取页面，成功；提交百度及谷歌收录；添加RSS订阅 2019-11-16 CDN加速；CSS小修 访问速度异常，配置 @Cloudflare CDN 加速，全局缓存（已更换，网页切换出现闪黑，不知是不是缓存设置的问题。PS: 最近 Netlify 是被墙了？） 2019-11-17 半个下午，评论系统的问题没搞定；配置 @panjunwen 开发的 Valine-Admin 进行管理 2019-11-18 浏览器恶搞标题；增加“读书”、“观影”板块 2019-11-19 界面加载优化；排版细节调整；评论系统更新；图片灯箱效果（半完成） 最近 GitHub pages 访问速度突然变得很可观，比 CDN 加速快多了。域名绑定 github.io，百度线路解析到 Netlify ， baidu spider 测试抓取成功。 没基础折腾起来是真的费时间，框架基本没什么大问题了，暂告一段落。心思还是放到如何顺利毕业上去吧…😂 Version 2.0 2020-02-05 更换主题为 NexT（感谢 @hsxyhao 移植) 2020-02-06 重新采用 Cloudflare CDN 加速；配色微调；爱心；增加 Valine 评论系统 LeanCloud 要求绑定域名，需要备案。转移至 LeanCloud 国际版。 2020-02-09 更改 blockquote 样式；instant.page 提高加载速度；添加 Google Analytics instant.page 将以下代码添加到 &lt;/body&gt; 之前： &lt;script src=//instant.page/3.0.0 type=module defer integrity=sha384-OeDn4XE77tdHo8pGtE1apMPmAipjoxUQ++eeJa6EtJCfHlvijigWiJpD7VDPWXV1&gt;&lt;/script&gt; 参考源：instant.page Google Analytics 在 &lt;head&gt; 标记顶部附近以及任何其他脚本或 CSS 标记之前添加 Google Analytics（分析）代码，并将字符串 'GA_MEASUREMENT_ID' 替换为您要处理的 Google Analytics（分析）媒体资源的媒体资源 ID（也称为“衡量 ID”）。 &lt;!-- Google Analytics --&gt; &lt;script&gt; (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){ (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o), m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m) })(window,document,'script','https://www.google-analytics.com/analytics.js','ga'); ga('create', 'UA-XXXXX-Y', 'auto'); ga('send', 'pageview'); &lt;/script&gt; &lt;!-- End Google Analytics --&gt; 参考源：analytics.js 库 Version 3.0 2020-03-01 NexT 主题稍显繁复，加载速度略慢，更换主题为 Chic（感谢 @ITJoker 移植) 2020-03-02 尽量精简主题；仅增加 Valine 评论系统，以及读书、观影页面。 Version 4.0 2020-04-25 又嫌 Chic 单调，人呐……这段时间，“NexT 更新良多，遂转回。同上，添加读书、观影；采用 jsdelivr cdn 加速博客静态资源的访问。 p.s. 若博客部署于 Github Pages，可直接更换链接启用 jsdelivr cdn 加速。格式如下： https://cdn.jsdelivr.net/gh/用户名/仓库名@master/*** jsdelivr 有缓存的，据说是更新间隔为一天，若调试需要，可将上述链接里@master改为@latest,强制拉取最新文件。 更新时间：2020年4月26日23:49:56 &nbsp; Version 4.1 2021-11-06 Gridea也挺久没更新了，Github访问速度更是感人，同步失败率贼高，半夜11点折腾博客转Hugo😂，主题依然是“NexT 。 2021-11-07 习惯可视化调试的小白，Hugo写个东西推送还是繁琐，今天才是真折腾。域名之前续到2022年底，但为了速度，一咬牙，转Gitee。博客第一还是专注写点什么，所以仍然采用Gridea写作和调试页面，然后用Vscode直接远程推送Output到仓库，再重新Deploy即可（更新频率毕竟不高，还能忍受）。 更新时间：2021年11月7日20:32:00 &nbsp; Version 4.1.1 2022-05-26 博客时不时就挂一下，也不知道啥原因，更完看不了可真是难受……买个能备案的域名，准备脱离平台。 2022-06-20 今天终于走完了备案流程。回来折腾OSS+CDN重新建站。半夜接到工作电话，嚯。 2022-06-21 重新调试，还有问题，原来是 jsDelivr CDN被污染了，真的蠢，第一时间不用电脑看源码，手机搞半天……目前也没找到合适的办法，先全部替换成 https://unpkg.com/ 的资源。暂时看看有没有起死回生的可能吧。话说，网站访问速度的老大难问题一下就解决了，还是hen开心的。 更新时间：2022年6月21日22:03:58 &nbsp; Version 4.1.2 2023-08-09 气死我了，凌晨1点35分收到阿里云短信，已欠费-70.71元，当然信息我是上午才看到的。加上原本的80，总计损失150多。阿里云OSS作图床的防盗链竟然没有任何用处，我查了下日志，一个小时内伪装refer反复访问我的一张图片，总计下行流量300多GB，可真够可以的。前面一小时还试探刷了约15GB的流量，发现没有管控，随即大量刷流量。我不太明白这种恶意行为的目的是啥，于他们自己又有什么好处。 当然更气人的是，对于这种恶意刷流量方式，除了关闭OSS公共访问权限竟然没有其他有效方式可以避免攻击，乃至于及时自动关闭服务，防止过量扣费的。询问了阿里云客服，一副爱莫能助的模样。天啦撸，我继续使用你家服务建博客简直是露腚的鸵鸟，谁都能过来折腾下是吧。 考虑了下，OSS上的资源全部放弃。博客直接转移回Github Pages，使用Vercel平台Deploy，反正域名不变。图床使用免费图床，我写的用图很少，唯一多的那篇是建立阿里云OSS图床教程，真是讽刺。好啦，就酱紫吧。 更新时间：2023年08月12日10:44:59 &nbsp; ","link":"https://yfnwu.com/post/blogself/"},{"title":"浮生一记","content":"聊聊我最近的生活吧。 常留心于生活细微处的美，慨叹瞬间消逝的遗憾。然同时嗟叹，当冷酷的理性到脑袋里徘一徘徊，眼前的世间又好似一团没有尽头的麻线，纷纷扰扰，凌乱不堪。光想一想生活的意义就觉着永远不会知道终极答案。 在以前，想法没这么多，思考也不很深，可现在，一旦追问起来，却发现残酷的人类从会思索起就在寻找答案的问题至今没有终结，而睁开眼看着自己的生活： 一切， 都在走向无可挽回的庸俗。 转身，总有不如自己的众生，我俯瞰，我竟在期待点什么。动力？珍惜？优越？警醒？可这就像用一个低层次的问题强行取代高层次的一样，治得了一时，动不了根本，问题依旧存在，只是从往下看的风景里暗示自己，这样已经很不错了，来之不易，何必自找不痛快？ 喷嚏不断，初始时喉痒，不住吸气，愈吸愈痒，至于嘴不由张开，继而吸取一气，为发射前最后的填充，“啊~~~楸———”一声穿透力极强且有质感的爆破声响彻寰宇，天上形云都似乎为之一震，风忽静，叶低垂，林下有人，面色如常，似乎适才何事都未发生，又或许无论天崩地裂，他也无甚在乎。他忽地皱了皱鼻梁，面前散发起空气的异常流动声，似乎暗示着刚刚发生的并不是虚幻，一切终将重演，大道轮回，何物免哉！ ","link":"https://yfnwu.com/post/fsyj/"},{"title":"踏虚空","content":"这次谈我一直想解决却屡屡重蹈覆辙的事，好像并没有什么新词能够恰如其分地描述它，拖延太笼统，逃避又太片面，想来想去，只是茫然地盯着屏幕，好像在等待什么降临到我的脑袋里。 人做一些一时看不到结果，但又不得不做的事时，就会生出一种感觉：脚踏不到实地的漂浮感。感觉一切都像是虚幻，整天生活在虚空中。 我想探讨人本身，只从自我出发，向外推测，基于我个人的经验和思考，它一定不是全面的，但是是一份有可信度的样品。 我不得不去相信一些东西，以此支撑我活在这个世界上，同我的族群一同生活。这个“不得不”的思考产生于我取得一些经验后。譬如：人真的有自主而独立的意识吗？如果世界仅仅就是混沌中产生的一种可能，那么所谓意识，不过是物质特殊组合产生的杂音，它相对于物质本身及同类有意义，于之外的世界来说，可能只是一团噪音——没有意义也不可能沟通。 我现在想法很乱，一种来不及的忧虑感和无所谓、无意义的放纵心态同时存在，我做其他的事，用消费刺激自我的情感起伏，只是为了逃避原有生活的秩序吗？我受不了也不喜欢是因为我真的一点也不喜欢，还是因为懒惰和趋利避害的天性占据一大部分呢？人要过得幸福，首先就是对自我的肯定，不论由于何种缘故，假使生活中处处碰壁，没有一项可凭立身的能力，他必然是不可能拥有自信的，因为建成任意一座楼宇，一定需要一个立足点，若无所凭依，何来自信的底气。 所以我目前情况的解决方案不在于在我现在百分之百认为不喜欢的事业上强迫自己投入所有可能的精力去完成、去优化、去精益求精，而在于我在我认为喜爱的事业里去培养、去有目的地训练、去争分夺秒、去在这样一个现实框架下使出全力去认识自己以及了解人类和这个世界。然后是毫不犹豫踏出与他人现实交流的一步，虚心且辨证地学习，明白自己的短处但同时坚持自己从生活中体味出来的、即使与多数人相悖的经验，我喜欢交流与包容的环境，但我认为人与人之间不可能达到真正的绝对沟通。每个人都是第一次来到这世界上过活、不带有任何经验与记忆，我从不会想去教导别人如何生活，每个人都独一无二，有自己的活法。自以为是的人，基因和生活经历造就了他，这即是他的生活风格，与多数人相抵触，但在人群中却也有相合的人。这世界光怪陆离，就像一个开启就关不上的大反应炉，诞生的生命形形色色，更别提人类的性情了。所以我们了解这个信息能做什么？ 我有一位好友，在我提出一种观点或表达一种展望的时候（行动类），讨论着讨论着他经常会冒出一句，这又有什么用呢？是啊，以我们目前的生活状况来看，很多我们关注的东西跟我们的距离都太远了，很大可能这辈子都只能是想象，更多虚无缥缈的形而上的东西，于生活之无用简直是一眼可以望见。我能想到很多很多可以来反驳上述是啊后面的话，什么仰望星空、梦想、人类进步之由……很多，甚至比反方还要多，所以你能说哪个观点就绝对正确吗？ 很多的关于生命、关于生活、关于现实的东西，其实都有一个预置的前提：意义。 为什么总有争论不休的观点，可能我的想法不很成熟，但我发觉，很多议论的双方你来我往，唇枪舌剑，好不热闹，却是讨论地多不是在一个维度上的东西，尤其很多辩论，特别喜欢在定义上做文章，不想在具体论点上攻守，却是大谈屁股的起源。 所有人看到的都是片面的透视，那么，集合所有的透视就是真正的世界了吗？ 我来到这个世界上，到底是为什么？这个问题就像是个无限迭代的黑洞，追问意义，意义之上还有意义；追问来源，来源之前还有来源；追问大脑，缸中之脑外还有大脑。所以，什么才是尽头。想这些问题，可怕的一点在于，理性告诉自己，永远也不可能知道答案；可另一方面，我们认为这个答案对我们自身很重要，接着质疑逻辑的起源，颇有成果，便以为找到一条靠近答案的路。 现实琐碎啊。 ","link":"https://yfnwu.com/post/hzzkz/"},{"title":"Winter Is Coming","content":"又到了凌晨两点。 我时常对生活有一种把控不住的无力感，越长大越甚。 小时候，我从村里的小学转到县里去，我那时可无忧无虑，对新环境也充满探索的激情，什么都想看看，尝试。而且好胜心，我不想这么叫他，可有助于你们理解，譬如说，跑步吧。那时，我对人之差异不曾思考过，总觉得，别人能做到的，我也能做到。（现在依然如此，不过要加个限定条件，我喜欢的）小学有体育课，有跑步测验，我和同学一起跑时，每每落下，便对自己说，我凭什么比人慢？！然后硬憋一口气，使多少劲也要拼了命赶上。如若失败了，少不得自责会儿。当然，成功总是在多数，所以，我那时拥有一种想做什么只要努力就能做成的自信。生活在我小小的脑袋里只是一艘我掌着舵的船，我想去的远方，所需的只是时间。后来，我发现，生活不是船，它是海，阴晴不定、变化多端，掌控它简直就像童话。 这一生，我该如何度过。人生淅淅沥沥二十多年，我从意识到这个问题开始，就一直在思考，尽管断断续续。先贤哲人抑或市井商贩，学堂教授抑或黄毛小儿……或读书、或对话，知晓了很多看待世界不同的、新奇的角度，可如何过好这一生，我仍是了无头绪。我有一种预感，这个问题可能还会伴随我很长的时间。我的不安感来源于哪里？对未来不确定性的担忧？可我不是自认为喜爱变化么？我是真的是为讨厌而讨厌吗？仅仅是为了标榜自己的一种个性，彰显自己的与众不同？可与众不同非说出来的，是做出来的。凡事说做都要两手抓，极端在任意情况下都不是最佳方案。 思绪如雪花乱飞，抓着这一片必然要错过别的世界。案前思千万，下笔无一言。 我最近的不安来自于我对自己把控力逐渐丧失的恐惧（在无拘束的条件下）。在这里我试着给自己合理化一些解释。不偏激。合理化不代表它的内核就一定是不合理的，在理性思维的框架下，合理化也是一种思考方式，从自身，从结果逆向思维的方式。 人都是有惰性的。为什么考试前的效率那么高？因为有清晰可见的危机感。 一是清晰可见。 二是危机感。 现在我的问题，危机感并不缺乏，甚至有时还过于浓厚，以至转变成焦虑。可多时只是一种感觉，是模糊的，不明确的。它不像一场考试那样有一个DEADLINE，它的限期是在不确定哪一天的未来，这样就给了懒惰以可趁之机，它告诉大脑，暂时放松吧，别担心了，有时间的。尽管大脑是时刻不停地运作的，可它也喜欢做一些释放多巴胺的活动，于是一拍即合，拖延就诞生了。然而，问题依然在那里，危机依然未消除，故拖延不能解决任何问题，而且只可能加重问题的严重性，越拖准备时间越少，时间越少越焦虑，越焦虑就越想逃避，越想逃避就越不可能有应付危机的能力，危机就这样来了。Winter is coming. 写到这儿想休息了，基于此，提供建议 NO.1：当机立断，先把最难的事拿出来，制定一个时间，能做就立即做，不能就先瞎做一个，然后干其他事儿，第二天再回看。 ","link":"https://yfnwu.com/post/wic/"},{"title":"LIFE IS STRANGE","content":"清晨五点十七分。 终章。 Chloe 还是 Arcadia Bay 。 …… 狂风在天地间呼啸，雨水简直使什么都看不清了。 Chloe，真的只剩下这一条路了么？一次一次地回溯时间，拼了命地想改变命运，我就是存着那么一点私心，不想失去你。而你站在悬崖边，哽咽着，让我放弃你。我的心都要裂开了！我们在一起度过的绵长光阴，是说放弃就可以忘记的吗？你早已成了我世界里的一部分啊，Chloe。 从小，我们就是最最要好的朋友，整天黏在一起，捉迷藏、扮海盗、跳舞、烹饪……小镇上我们的身影无处不在。我从不曾怀疑，这样的生活会永远持续下去。然而，那不期而至的黑暗，打碎了童年。2008年3月13日，我清楚地记得那一天，你父亲 Willian 给我们拍完合照后，接到电话，随后开车接你母亲下班，这一去，便再没能回来。晴天霹雳般的打击，悲伤犹如潮水淹没了你。 这是你最需要陪伴与安慰的时候，我却离开了，尽管是由于父母的工作变迁，但我仍然原谅不了自己。 你母亲在 Willian 走后结识了 David，也就是你的继父。他是个退伍老兵，不怎么会表达对你的关爱。那时，你依旧沉浸在父亲逝世之殇中难以自拔，在你眼里，他一个陌生人，突然闯入你的世界，在你失去爸爸的时候，又夺走了妈妈，所以恨意扎根生长，连带起和母亲都整天斗嘴。内心的孤独与不安，犹如两条毒蛇，啃噬着脆弱的十三岁少女的心。我的缺席，使你连个与之倾诉的人都无处可寻。难以想象，那些个悲切落寞的日日夜夜你是如何独自撑过来的。这一切也在你身上留下了道道痕迹，一周前，我们久别重逢，第一眼我竟没能认出你来。 天性淡漠的我，短信总忘回，是个十足的聊天冷场王。我交了些新朋友，可我发誓，最好的朋友永远是你。所以，当你说起，我不在时，你结识了一个特别要好的朋友 Rachel 时，心底一股抑制不住的酸涩，如泉涌出。但我更感谢 Rachel ，不在你身边的日子，是她安慰你，陪伴你，帮助你度过了我可能永远无法想象的一段艰难时光，我多希望我们三人可以成为永远的好朋友啊。 稍起色的生活不过两三年，无情的厄运却再次当上主角： Rachel 失踪了！昏暗、阴霾里好不容易漏下的一丝阳光啊，上帝是如何忍心？ Chloe，你疯一样地满世界找，寻人启事印了一摞又一摞，整整半年，一丝线索都不见却仍未影响你半点决心。Rachel 若有知，她一定会为拥有你这样一位朋友而感到幸福。 哦， Rachel ，我坚信 Rachel 在这里也一定不会放弃你的，Chloe…… …… 线性的时间在此处已失去概念，一周中来万千场景一一在我眼前闪现。 恍然间，看到你站在悬崖边，身子柔弱地像要被吹跑。我奔到你跟前，使劲抱住你，背后的巨大龙卷风暴与滔天海浪似乎也不那么可怕了。 其实， 我从不关心生死，只关心你。 -Max Caulfield, Don't you forget about me! -Never. ","link":"https://yfnwu.com/post/lifeisstrange/"},{"title":"人生一场大梦","content":"清晨下起了雨，过午方停。外边空气带着丝丝凉气，在连续高温的夏日里，可算是慰藉了。然而自习室却把空调停了，反是里热外凉，里闷外清，坐在这里，好，不自在。适才，又有个女孩儿去把半开的窗给拉上了，更觉闷。 早上醒过来时，屋内昏昏暗暗，侧过身子伸手稍稍动了下窗帘，天光偷跑进来了，不很强，是个阴雨天。我似乎闻到了雨打稻草堆特有的微弱清香，淅淅沥沥的小雨在瓦片上扬起一阵轻烟，从童年的纱门里往外眺望，天地间一片水墨挥毫。 时间应该还早吧，我眼睛里的世界依旧朦胧。手立时在被子起伏之间摸索着，好像昨晚把手机丢桌上了，忽的琐碎记忆合在一起。好吧，至少得起身看看时间。晦暗的空间里，好像舍友们仍在他们床铺上歇着，我稍甩下头，坐起身来，将两双手提与胸前，先是手背，然后是手心，轮流翻转几下，进行一场游戏开端确认自我存在的戏码。再是翻身下床。 10:50 AM. 记得我以前曾在备忘录里写下过两个字：诗意。那时，看书渐多，联想视频艺术方面的经验，发觉生活之美、之意从来都存在，只是习惯掩盖。 一直觉着我有异于常人的三维空间想象能力，给一些必要元素，我就能够搭建一个合理的场景，并能从各种角度，只要是我能从镜头语言里学习到的，来回放，来展示主体对象的运动。简单地说，即具象化能力。这一点在回忆时很有意思，也很有用，尽管它常常在不经意间篡改我的记忆，仿若过去的一切都不只是在我眼睛里呈现的，我又喜幻想，这样导致很多东西被藏匿，可能永远都不会记起。 视频剪辑及制作教给我重要的一点就是角度把控，很多平凡无奇的场景，换一种不寻常的角度，顿时就给你一种新奇感，未体验或很少体验的东西最能吸引人的注意了。陌生感，对，就是陌生化我们业已熟识的事物，告诉我们它不一样的一面。人类精力有限，而透视角度无限，故不可能穷尽每一种角度，熟悉的人和事，总会有你不知道的一面，静静安于此，只是观察，只是欣赏，只是来人间走一遭，未体验的事物实在太多啦，不计本质异同，何不就放下那些追赶争强心思，活在当代，不用为基本的生存需求担忧，轻松一点，才能多感受一些美的存在。 Life is Strange. ","link":"https://yfnwu.com/post/rsycdm/"},{"title":"孤","content":"从个体至万物，我愈生活愈感到孤独，如此强烈，不可名状。 尼采说，“人不见得喜欢彼此沟通，宁可隐藏秘密。”这不可悲，可悲的是就算人们愿意沟通，倾向沟通，却永远也不能够真正彼此相通。即使是个人自言自语也不能完整地展现内心所想，并非自我控制，实不能也。 鲁迅先生一篇文章里有这样一句：“人类的悲欢并不相通，我只觉得他们吵闹。”确实，悲欢并不相通，也不可能相通，生命连自由意志都没有，从无法选择的出生开始，一路看似选择的合集，实是被家庭、社会环境推着走，这不是悲观，而是生活背后的限制。你进行选择的理由可以列出一长串，然而外在的限制就使自由不可能，所以我尊重每个人的情感变化，我不觉得他们吵闹，我只觉得深深的孤独。 每个人都是西西弗斯，每个人都在独自地推着他那块石头。 ","link":"https://yfnwu.com/post/gx/"},{"title":"Life Is Short","content":"二零一九年的阳光，同学再也不能照见了。 高中同窗，半个月前离开，平常联系很少，所以具体什么原因也不清楚。继外公逝世后，这是我生活中认识的第二个。消息得到确证的一刻，感伤、唏嘘。往日记忆如雾隐去，一番激荡，生活回到日常，他来过他走了。我知道，这只是个开始，往后时光，会渐渐地、慢慢地有许多我认识、熟悉的人离开，我目送，或者，被目送。 死亡离我们多远？它在我们遇到的每一个人身上，在我们做的每一件事上，它可以很远很远，也可能很近很近。所以不管如何，先要认识它、了解它，才能在它到来的时候，心里有一个底。并不是说就能够看开、沉着，能不慌不张、不悲不喜了，是当它站在我们面前的时候，至少不再有对未知的恐惧，可以轻轻地抬手，跟它打个招呼：你好哇，死亡先生。 死亡先生，从人类诞生起就一直相伴至今，也将永远伴随下去。所以，首先要明白：死亡无可避免。它不是一个不想面对就不会面对的东西，无论怎么逃避，它就在那条路上，我们必走的人生之路。确定这一点很重要。 以前的时候，孔子说：未知生焉知死。意思是活着的事情你还没搞明白呢，怎么有闲情去考虑死亡。这代表了一种很典型的生死观，而且在我们文化传统里更是随处可见，在社会生活中也一向忌讳死亡的话题。可是这样只考虑生的后果是什么？你想过没有。人生是有限的，一直只考虑生的问题，一直就按着本能、习惯去生活，真的到面临那一天的时候，你才突然想到，怎么就结束了呢，如果有再来一次的机会，我不会继续循规蹈矩地活着。可是没有如果，死亡已经来临，后悔无济于事。生命只有一次啊。 故而从这个角度上思考，生命的意义可以说是死亡所赋予的。未知死焉知生，逃避思考死，其实就是是逃避思考生。 海德格尔有个概念“向死而生”，忽然觉得很是契合。当我们把死亡看做一种可能性的时候，我们是在面向死亡思考现时的人生。先一步在终结前的状态评判现时的种种，至少可以分清体现我们人生最本质价值的是哪些事物。回到当下，更好更有目的地去规划，去尝试。做到就算下一秒就死，这一秒我做的、思考的事物对我来说是有意义、有价值的，我不后悔，这便足够。 同学，你我相逢于锦绣年华，如今分道，愿尔回首半生无可悔，我们会再见的。 再见。 ","link":"https://yfnwu.com/post/lifeisshort/"},{"title":"余生","content":"如果现实的阻碍都可以被解决，余生中，你想做什么？ 最近看书看得大脑有些混乱，迷迷糊糊的。似乎成了一种逃避现实生活的手段。假如现实真的如理想一般无限制了，你想做什么呢。 出生时一丝不挂，被死神唤走时同样如此。前人说的身外之物，不仅仅指一般等价物，从降生到告别的路程给予了很多东西，譬如情感，譬如思想，譬如人际关系。物质是生存必需，但这些才是人之所以为人的特殊之处。死亡时，这一切就被自然接管了，与你再无关系。我未从这世界带走什么，我与来时一样清白，桑丘经常这样念叨着。这是一句西班牙谚语，原句我记不清，大概意义如此。在文字出现前的年代，一些俗话、谚语被总结出来，被用作口口相传的生活简易准则，谁的记忆力好，谁就算是有智慧吧。 回到自身，我发现，认识这个世界的历程是奇怪的，至少到目前而言。我总是先知道一些文字或词语，初识不明其意，但也没有去探究的想法，后来在虚构中使用它，也并未感觉有何不妥；再后来也就是现在，我读到一些书，它用的词我都认识，却理解不了。我以为我见过用过这个词我就能掌控它了，不是这样的。于是我探究它，从起源，从词源，好的，我知道了。我盯着它，脑子里回荡着词的解释，陌生，陌生，更陌生了，不应该是这样的啊，我双手抱头，仿若脑袋在痛苦地挣扎。理解与不理解，有什么分别呢？人真的有所谓的本质吗？随着智识的增长，我肯定会发生一些变化，身体上毋庸置疑，而行为上，有多少是受自身思想变化的影响，又有多少是因为别人的眼光。 想仔细回溯一下前半生，我之所以为我的演变历程定会激发一些思索，但只是寻找答案么？于此，是否两个方面的陈述理由依旧模糊。 ————待续 ","link":"https://yfnwu.com/post/yswl/"},{"title":"角蟾与游骑兵","content":"大概在前天。值班时候读欧亨利短篇小说集，里面有这样一篇： 年轻的游骑兵带着他的情人——一只角蟾，加入边境护卫队，且很好地融入了这个集体。在一次缉拿边境强盗的追捕中，他失踪了，并被护卫队友当成了逃兵，且以此为耻。一年后，护卫队执行一次任务路过当初发生追捕的地点附近，他们见到了一位孤身狙击三个匪徒的牛仔尸骸，突然角蟾从破烂衣物中探出身来，队员们认出了他们的战友，那么英勇，联队的荣誉从未丧失，以歌颂，以敬致。 我讲得挺啰嗦，原文也不很长，只是叙说了更多的细节。 老实说，我当时读完的第一感想是关于生命的灿烂与早逝。在如此年轻的光景，就早早献出了生命，我敬佩他的英勇，更惋惜：他对这个世界的多彩纷杂还所知甚少时，就丧失了继续感受的机会。 生命是脆弱的，生活是无常的。 在知识获取、人生感怀方面，我要把每一天都当成是最后一天来度过，生怕消逝之前，人无知生无趣，尚未了解自身即已化为齑粉。“他来到了这个世界上，好像从未来过。” 当然，生命也是一个连续的过程，尽管死亡的结局无可避免，当生命正是因由消弭才成其价值。故在此，我要有计划地了解事物，学习新知识，这样才能日日更新，同时锻炼技能，有自足之力。 p.s. 小说标题《吉米·海斯和缪里尔》 ","link":"https://yfnwu.com/post/jcyyqb/"},{"title":"万圣节与堂吉诃德","content":"新的月份，今天是万圣节，没参加甚活动，只觉春节已然在向我招手。 日子要是过得重复起来，就会失速乱跳，明明前天还在进行着世界杯呢，怎么转眼便是万圣节了，圣诞节也在后边排着队，都不必掰指头算日子，准一晃儿的事。 午饭后，将《堂吉诃德》读完了。奇情异想的骑士，三次出门冒险，最终被友人使计劝了回来，未满一年，抑郁而逝。我对于结局是不大满意的，以堂吉诃德·台·拉曼却骑士头脑识见之高明，怎会轻易抑郁而亡？我宁可相信是塞万提斯为绝他者续写牟利之门而为之。骑士先生虽盲目于游侠骑士道，可在其（所信）认知框架内，发表的见解均是有理有据，逻辑自洽的，骑士先生的思辨能力毋庸置疑。这样的人脑中门路未通时是理想浪漫主义，可一旦被点拨开，要么对自己分丝条析缕，要么一笑置之。而自此沉沦现实、郁郁而终的可能性终归太小了些。 适才一舍友忽出声喊叫，似是招呼谁。以为是醒着在喊我，便回一声“什么”，沉寂几秒不闻回应，然后又一串叽里咕噜不知所言的声音，原来是梦中呓语。呃，我也睡了罢。 ","link":"https://yfnwu.com/post/wsjytjhd/"},{"title":"江湖之殇","content":"现在是下午三点多四分，早晨值班，过午下班，适才一直在补记前几天日记。值班的事没什么好记的，无非是些繁复无聊的工作。 昨天，2018 年 10 月 30 日下午，金庸先生逝世。 初闻此事不觉信，毕竟谣传已几回。尤其是一个小时前，我刚刚将《金庸其书》读完，脑中尚未对全书形成整体观感，就有人告诉我，金先生走了。无法言说的感觉，人在活着时最难受的不是死亡，却是活着本身。昨天在哪本书里看到相似的话，是忘了。有好多话想说，有很多事想讲。少年记忆一幕一幕总掺着金武江湖的影子，如今江湖的造物主走了，少年长成青年，埋首于学业。江湖，阔别已久。 初闻先生，由敬佩起。电视剧大都看得，小说先阅《倚天屠龙记》，后读《神雕侠侣》。犹记初捧书，手不释卷，侧重情节起伏。后视之，人物的描摹、景物的刻画、情节的架构以及搭建所需的各种历史、人文至于生活经验知识都让我有“此生不可及”之慨叹。我非盲目，胆敢与金先生相提并论，只是从小文章极难作，可以说是绞尽脑汁一字不出的那种。后立志，今生看来虽与写作无缘无分，但我不服气，偏要勉强。如练武，不必天下第一，至少强身健体；写作不必成为吃饭的家什，至少有娱己的乐趣。 吾爱幻想，写出文字但求忠于内心。稍有成长，读金先生之作，叹极反激好胜之心。尽管如今先生文字之功底于我仍是一天堑，且无需气馁，相比旧时我，成长明眼可见，即进步，即可喜，即有望。人生意义，不过希望二字。笔墨不停，希望不止。 前路毕竟漫漫，阻碍或许重重，在人间的我们，只盼都能诚挚而坚定地活着。 走好咯，先生。 ","link":"https://yfnwu.com/post/jhzs/"},{"title":"夏洛不烦恼","content":"昨晚和朋友去看《夏洛特烦恼》。 实不该先看影评，被别人讲出来的共鸣，滞塞了自己的表达。 电影故事就跟重生网文一个样。人生各种失败，生活各种遗憾，机缘巧合下穿越时空，回到过去，依凭预知未来的金手指，过上梦想的生活。 很俗的一个情节，不是么？稍稍读过一些网文的，都知道这个套路。 但是，它作为喜剧电影来讲，可以说是不错的。这个经历了笑点革命的信息时代里，一部能让观众从头至尾笑声不断的电影，很少了。它不仅做到了，还挺出色。 关于喜剧的内核是悲，每个人背后的悲情一面，矛盾与冲突的笑点分析已有很多，不复赘述。 谈谈我所看到的。 结尾，夏洛在酒店卫生间里醒来，发觉之前只是一场梦，他是如此地欣喜若狂，急不可耐地拥抱妻子。紧接各种镜头也是夏洛依恋妻子的画面，稍夸张了些。 猛然给我特别熟悉的感受，哦，像极了《人生遥控器》里，主角经历完他任凭自己喜好的一生，死亡时刻千分万分地悔恨，而醒后发现，这不过是一场梦，之后的那种狂喜。 经历了才会有刻骨铭心的可能，才会明白什么是真正需要和宝贵的。 在那之前，不论你读过多少名言警句，听闻多少大小道理，喝进多少中外鸡汤。多是经历之后，用于领悟感受的描述，而很少很少能真正作为当下行事之指导及准则。应该成为和已经成为是不一样的。更遑论这里面还包含经验深浅的问题。 所以，我现在清楚地明白，表面上的懂得和深入骨髓的知道差别有多大。 所以，一夜之间的长大并不是个童话。 所以，真正的知道，不亲验是不行的，不失去是不行的，舍得与放弃是成长之必修课。 所以，趁你还年轻，趁阳光正好，趁微风不燥，出门，行走，经历，愈年轻愈是尝试的好时光。 当然啦，少年，我更欣赏你自己安慰自己，安慰着安慰着还能让自己咧开嘴笑出来的样子…… ","link":"https://yfnwu.com/post/xlbfn/"},{"title":"请温和地走进那个良夜","content":"耳畔寂静，秋夜渐深。 眼中屏幕光渐暗去，男孩依旧保持侧卧姿态。书中亿万文明终结影像如静止在眼前，他对这宏大突然有种强烈的疏离感，我必须做点什么，他想。 一阵窸窣，黑暗中男孩窜下了床，轻手轻脚推开寝室木门。走廊到盥洗室的路灯火通明，眼睛在光线转换中稍受刺激，男孩进门时便顺手将顶灯按灭，驱走光芒。看着镜中自己朦胧的身影，仿若空间压散了身形，而那些文明，在加速逝去。 我得看向更远的地方，他伫立于窗边。 透过一层玻璃，窗框内有两个世界。往下是对面寝室楼的轮廓和楼角几棵树，虽说影影绰绰不真切，但都是熟悉之极的事物。远方不在这儿。仰头向上，星空或许才是方向。 可是，怎么散入瞳孔的光线唯有昏黄，这片夜空宛若无边荒漠的一隅，沉寂和空荡竟在此发出回响。 明月与星空是被禁锢了吗？那道横亘的帷幕竟有如此的力量。 甚至于表面的泛黄也只是人间倒影，亿万颗星辰皆不知何往。 怅怅然若失，他只是想找寻一丝书中世界与现实生活间的感觉联结啊。尽管理性的声音在不断慰藉：城市夜空，繁星是最不合实际的奢望。 男孩渐自明晰，有一种汹涌澎湃至于颤抖的激情，贯穿阅读之始终。未来的宏大撞上了眼前的渺茫，以至此时此刻站在窗前的他，突然觉得好难过。 总以为，抬头看到的会是 璀璨星河。 阅《 地球往事-死神永生 》后 也致我最爱的《 Interstellar 》 于2015-9-22 上为修改版本 下为初始日记 &nbsp; 2015-9-22 &nbsp; 我会记得读完《三体》的这个夜晚。 凌晨一点半，我合上屏幕，起身下床。楼道里剩几盏灯光，于我却有些刺眼。洗手池右边墙壁上安着一扇窗，仰头向上可瞥见一小片夜空。 怎么只有晦暗、昏黄 像是无边的荒漠 更如无界的深渊 除了空荡 什么也没有 我推了推眼镜，努力眨动双眼 星空与明月似乎都被禁锢 然帷幕之前 仅反射些许人间灯火 除了沉寂 什么也没有 有些失落，奋力想寻找书与现实生活之间的一点线索。尽管明知，城市的夜空，星月都是一种奢侈。 有一种暗自澎湃的激情，贯穿阅读始终。以至窗边的我，突然很难过，总觉得，在我头顶上方，应该是 璀璨星河。 ","link":"https://yfnwu.com/post/2015ye/"},{"title":"向死而生","content":"“叮——” 铃声从墙外透进来，九号楼听来比七号楼略低沉。 “大家安静点，点下名。”班长缓步迈至教室前方。 哦，下课了。我轻合上课本，手顺而上揉揉酸涩的双眼。有人关上了窗，涌进耳朵里的各种声音更加明晰，虽嘈杂却并不使我厌烦。一声声点名伴随同学们的私语，似编织成一种更深的宁静，而我的思维在这宁静的旷野上不断跳跃。 “遥不可及的并非十年之后，而是今天以前。”在这座富有历史感的教学楼里上课，我总不由地会联想时间相关的事物。 可以很轻易地从字面上解读它的含义，所表达的无非是着于当下，放眼未来，好好珍惜等等。这样的话语，组合一种淡淡的美感，然而并不会展现出特别实质性的思考，换一个新颖的句式老生常谈。信息时代，此类句子甚或文章曾不出穷，很多都会被读者冠以鸡汤之名。 “看过许多道理，却仍过不好这一生。”如此之类的慨叹我以为或多或少与鸡汤式道理的涌现有所关联。当然，并不表示我反感这样的短句，一切结构优美、行文简洁的句子，就像俗语那样，都有其存在价值。 “遥不可及的并非十年之后” 我在想象十年之后的生活，我的十年之后，朋友们的十年之后。那时我会从事什么样的职业、生活在哪座城市、有没有成为我所期待的那个人、兴趣爱好有了什么样的改变、身边陪伴的人还在一起么、父母如何、亲友如何、有没有过上我一直想要并为之努力奋斗的生活……十年之后，31岁了，大概也有了自己的家庭，为人夫，为人父（写下这几个字的时候，感觉有一股震颤从灵魂深处袭来，那是我一生又一个荣光时刻啊）蓝天、白云、草坪、一家人，心中的向往有如画面一般。我一定做一个好儿子，好丈夫，好父亲，最好的自己给最亲最爱的人。 “而是今天以前。” 睁开眼，思绪回归。如果拉开一个镜头到窗外，学生时代的我手揉着双眼沉于想象，端坐在教室中央，周围是纷纷扰闹的同学……附上一层泛黄滤镜，恍若隔世的画面感。教室窗外不远，屹立着四百年前的城墙。 历史，时间。时间创造了历史，而历史却不耽于时间。 如果以十年为一段，人生便是由这一段段的经历构成。我在一本书上读过有关的思考，其意概如此：人生是由一个又一个选择构成的，关键的选择甚而会决定你人生走向。譬如说高考，它会影响你十年乃至二十年的生活。去不同的地方上学，遇到不同的人，做不同的事情，这些经历会改变你，塑造一个越来越立体的你。朋友，环境，生活品质等这些都是可以选择并发生改变的，选择变了，你包括你的生活会完全不同。 有些人会选容易的路走，有些不敢选，有些不知道怎么选。缺乏决策的胆识，自然成为不了理想的样子。 为什么会这样？究其原因，是内心深处缺乏对自身的安全感。心怀恐惧，如何前行？固守在舒适区，如同自我放逐。 那关于这种安全感，如何自给？ 从时间跨度来讲，人生真的很短暂，数不过几十年。所以，当生命走至尽头，不论以何种方式，在离去前的那一刻时光，你会去想，未完成的梦想、未告别的人。 然后我会回忆，现在。现在，我想做什么？ 现在是学生时代的我，每天面临着许许多多的选择，决定权在自己。 我喜欢一个姑娘，如果我不去和她讲，不去放开手追求，当我离开世界的时候，想到这个我会不会感到遗憾？ 一定会的。抱憾而去，遗憾终身，绝不好受。 睁开眼，所幸镜子中的自己还未白发苍苍，略显稚嫩的容颜代表这还是青葱岁月，一切都还来得及，遗憾可以弥补，错过不再发生，我还有时间。 这时候做出的选择果断而坚决，无一丝迟疑，即有了选择的胆识。你不会再焦躁不安，忐忑不前、怕这怕那，即使有你也很清楚这不会影响你做决定，因为你明白你真正想要的是什么，怕什么已无关紧要。 换句话说，你已经拥有了沉淀人生的安全感。 以这种想法去生活的时候，你会对未来有初步的规划，你会想每一天都要比前一天过得更好，每一天都有提高，进入这样一种状态，如何会对生活恐惧？积极的心态，满满的热爱。倘有低谷来临，也能拥有再起的自信。 况且人生之选择，很多时候事前难以判别对错，每每都想走一条正确的路，绝非易事。而向死而生赋予自己的胆识，让自己走一条可能不一定对，但忠于内心，一定要是自己想要的路，但求无悔。 毕竟死亡也不是真的很遥远，可能七八十年，亦可能近在眼前，不贪而无悔，足矣。 “叮——” 上课铃欢快响起来，我似乎听到窗外古城墙传来了回音。 ","link":"https://yfnwu.com/post/xses/"}]}');
                    var inp = document.getElementsByClassName("inp")[0], btnList = document.getElementsByClassName("btn-list")[0], prompt = document.getElementsByClassName("prompt")[0], user = document.getElementsByClassName("user")[0]; function createList(a) { var b = ""; a.forEach(function (d, c) { b += '<div class="list-box"><div class="card list-item block card-plain"><div class="list-content"><div class="list-body"><a href="' + d.link + '" class="list-title text-lg h-2x">' + d.title + '</a><div class="list-desc d-none d-md-block text-sm text-secondary my-3"><div class="h-2x ">' + d.content + "</div></div></div></div></div></div>" }); user.innerHTML = b };

                    function getInput() { state.change({ type: "text", value: this.value }) } function anti(a, b) { var c = null; return function () { var d = this, e = arguments; clearTimeout(c); c = setTimeout(function () { a.apply(d, e) }, b) } } function show() { if (user.children.length == 0) { prompt.style.display = "block" } else { prompt.style.display = "none" } } function addFn(b, a) { return function () { var c = a; for (prop in b) { c = b[prop](state.getState()[prop], c) } return c } } var perArr = addFn({ text: filterText, sex: filterSex }, person.posts); btnList.onclick = function (b) { var a = b.target; if (a.tagName == "LI") { document.getElementsByClassName("active")[0].className = ""; a.className = "active"; state.change({ type: "sex", value: a.getAttribute("sex") }) } }; function filterText(b, a) { return a.filter(function (d, c) { if (d.title.indexOf(b) != -1 || d.content.indexOf(b) != -1) { return true } }) } function filterSex(b, a) { if (b == "all") { return a } else { return a.filter(function (d, c) { if (d.sex == b) { return true } }) } };
